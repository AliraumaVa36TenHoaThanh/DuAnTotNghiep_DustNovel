<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="commentSection" class="mt-4">

    <!-- TITLE -->
    <h5 class="fw-bold mb-3">Bình luận</h5>

    <!-- FORM GỬI COMMENT CHA -->
    <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-body p-3">

            <form th:action="@{/DustNovel/chuong/{id}/comment(id=${chuong.id})}"
                  method="post">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <div class="d-flex gap-2">
                    <textarea name="noiDung"
                              class="form-control rounded-3"
                              rows="2"
                              placeholder="Viết bình luận..."
                              required></textarea>

                    <button class="btn btn-primary fw-bold px-4 rounded-3">
                        Gửi
                    </button>
                </div>

            </form>

        </div>
    </div>

    <!-- DANH SÁCH COMMENT CHA -->
    <div th:each="bl : ${comments}" class="mb-3">

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-3">

                <!-- HEADER -->
                <div class="d-flex justify-content-between">

                    <div class="d-flex align-items-center gap-2">

                        <!-- AVATAR -->
                        <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold text-white"
                             style="width:40px;height:40px;font-size:16px;
                                    background: linear-gradient(135deg,#4e73df,#1cc88a);
                                    box-shadow:0 2px 6px rgba(0,0,0,0.15);
                                    flex-shrink:0;">

                            <span th:text="${#strings.substring(bl.nguoiDung.tenDangNhap,0,1).toUpperCase()}"></span>
                        </div>

                        <div>
                            <div class="fw-semibold small"
                                 th:text="${bl.nguoiDung.tenDangNhap}"></div>

                            <div class="text-muted small"
                                 th:text="${#temporals.format(bl.ngayBinhLuan,'dd/MM/yyyy HH:mm')}"></div>
                        </div>

                        <!-- NÚT TRẢ LỜI -->
                        <button type="button"
                                class="btn btn-sm btn-link p-0"
                                data-bs-toggle="collapse"
                                th:attr="data-bs-target=${'#replyForm_' + bl.id}">
                            Trả lời
                        </button>

                    </div>

                    <!-- SỬA + XÓA COMMENT CHA -->
                    <div th:if="${currentUser != null and currentUser.id == bl.nguoiDung.id}">

                        <button class="btn btn-sm btn-light border px-2 py-0 me-1"
                                type="button"
                                data-bs-toggle="collapse"
                                th:attr="data-bs-target=${'#editForm_' + bl.id}">
                            Sửa
                        </button>

                        <form th:action="@{/DustNovel/chuong/comment/delete}"
                              method="post"
                              class="d-inline">

                            <input type="hidden" name="commentId" th:value="${bl.id}">
                            <input type="hidden" name="chuongId" th:value="${chuong.id}">
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}" />

                            <button class="btn btn-sm btn-outline-danger px-2 py-0">
                                Xóa
                            </button>
                        </form>

                    </div>

                </div>

                <!-- NỘI DUNG -->
                <div class="mt-3"
                     th:text="${bl.noiDung}">
                </div>

                <!-- FORM SỬA COMMENT CHA -->
                <div class="collapse mt-3"
                     th:id="${'editForm_' + bl.id}">

                    <form th:action="@{/DustNovel/chuong/comment/update}"
                          method="post">

                        <input type="hidden" name="commentId" th:value="${bl.id}">
                        <input type="hidden" name="chuongId" th:value="${chuong.id}">
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}" />

                        <textarea name="noiDung"
                                  class="form-control mb-2"
                                  rows="2"
                                  th:text="${bl.noiDung}"
                                  required></textarea>

                        <div class="text-end">
                            <button class="btn btn-success btn-sm">
                                Cập nhật
                            </button>
                        </div>

                    </form>

                </div>

                <!-- FORM REPLY -->
                <div class="collapse mt-3"
                     th:id="${'replyForm_' + bl.id}">

                    <form th:action="@{/DustNovel/chuong/comment/reply}"
                          method="post">

                        <input type="hidden" name="parentId" th:value="${bl.id}">
                        <input type="hidden" name="chuongId" th:value="${chuong.id}">
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}" />

                        <textarea name="noiDung"
                                  class="form-control mb-2"
                                  rows="2"
                                  placeholder="Viết trả lời..."
                                  required></textarea>

                        <div class="text-end">
                            <button class="btn btn-sm btn-primary">
                                Gửi
                            </button>
                        </div>

                    </form>

                </div>

                <!-- HIỂN THỊ REPLIES -->
                <div th:if="${bl.replies != null}"
                     th:each="rep : ${bl.replies}"
                     class="mt-3 ms-4 border-start ps-3">

                    <div class="d-flex justify-content-between">

                        <div>
                            <span class="fw-semibold small"
                                  th:text="${rep.nguoiDung.tenDangNhap}"></span>

                            <span class="text-muted small ms-2"
                                  th:text="${#temporals.format(rep.ngayBinhLuan,'dd/MM/yyyy HH:mm')}"></span>
                        </div>

                        <!-- SỬA + XÓA REPLY -->
                        <div th:if="${currentUser != null and currentUser.id == rep.nguoiDung.id}">

                            <button class="btn btn-sm btn-light border px-2 py-0 me-1"
                                    type="button"
                                    data-bs-toggle="collapse"
                                    th:attr="data-bs-target=${'#editReply_' + rep.id}">
                                Sửa
                            </button>

                            <form th:action="@{/DustNovel/chuong/comment/reply/delete}"
                                  method="post"
                                  class="d-inline">

                                <input type="hidden" name="replyId" th:value="${rep.id}">
                                <input type="hidden" name="chuongId" th:value="${chuong.id}">
                                <input type="hidden"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}" />

                                <button class="btn btn-sm btn-outline-danger px-2 py-0">
                                    Xóa
                                </button>
                            </form>

                        </div>

                    </div>

                    <!-- Nội dung reply -->
                    <div class="mt-1"
                         th:text="${rep.noiDung}">
                    </div>

                    <!-- FORM SỬA REPLY -->
                    <div class="collapse mt-2"
                         th:id="${'editReply_' + rep.id}">

                        <form th:action="@{/DustNovel/chuong/comment/reply/update}"
                              method="post">

                            <input type="hidden" name="replyId" th:value="${rep.id}">
                            <input type="hidden" name="chuongId" th:value="${chuong.id}">
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}" />

                            <textarea name="noiDung"
                                      class="form-control mb-2"
                                      rows="2"
                                      th:text="${rep.noiDung}"
                                      required></textarea>

                            <div class="text-end">
                                <button class="btn btn-success btn-sm">
                                    Cập nhật
                                </button>
                            </div>

                        </form>

                    </div>

                </div>

            </div>
        </div>

    </div>

</div>

</body>
</html>
