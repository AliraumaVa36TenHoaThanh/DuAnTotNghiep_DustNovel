<div th:fragment="content">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        .bookmark-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid #e2e8f0;
            border-left: 6px solid #4f6ef7; /* Viền nhấn bên trái */
            background: #ffffff;
        }
        .bookmark-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.08) !important;
            border-left: 6px solid #f59e0b; /* Đổi màu viền khi hover */
        }
        .novel-cover {
            width: 95px;
            height: 130px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .text-truncate-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2; /* Chỉ hiện 2 dòng text trích dẫn */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .bg-page {
            background-color: #f8fafc;
            min-height: 80vh;
            padding-top: 2rem;
        }
    </style>

    <div class="bg-page">
        <div class="container mb-5" style="max-width: 950px;">
            
            <div class="d-flex align-items-center mb-4 pb-3 border-bottom border-2">
                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3 shadow-sm" style="width: 55px; height: 55px; font-size: 24px;">
                    <i class="fa-solid fa-bookmark"></i>
                </div>
                <div>
                    <h2 class="fw-bold mb-0 text-dark" style="letter-spacing: -0.5px;">Dấu Trang Của Bạn</h2>
                    <p class="text-muted mb-0 mt-1 small">Lưu lại mọi khoảnh khắc tuyệt vời trong từng trang truyện.</p>
                </div>
            </div>

            <div class="list-group shadow-sm border-0 rounded-4">

                <div class="list-group-item text-center py-5 border-0 bg-white rounded-4" th:if="${#lists.isEmpty(dsBookmark)}">
                    <i class="fa-solid fa-book-open-reader text-muted mb-3" style="font-size: 4rem; opacity: 0.3;"></i>
                    <h5 class="fw-bold text-secondary mt-2">Chưa có dấu trang nào!</h5>
                    <p class="text-muted px-4">Hãy trải nghiệm đọc truyện và bôi đen đoạn văn bản yêu thích để lưu lại vị trí nhé.</p>
                    <a th:href="@{/DustNovel}" class="btn btn-primary rounded-pill px-4 mt-2 fw-bold">Khám phá truyện ngay</a>
                </div>

                <div class="list-group-item d-flex flex-column flex-md-row gap-4 p-4 bookmark-card mb-3 rounded-4 shadow-sm"
                     th:each="bm : ${dsBookmark}">

                    <div class="flex-shrink-0 text-center">
                        <img th:src="${bm.chuong.truyen.anhBia}" class="novel-cover" alt="Bìa truyện">
                    </div>

                    <div class="flex-grow-1">
                        <h4 class="mb-1 fw-bold">
                            <a th:href="@{/DustNovel/truyen/{id}(id=${bm.chuong.truyen.id})}"
                               th:text="${bm.chuong.truyen.tenTruyen}" class="text-decoration-none text-dark">
                            </a>
                        </h4>

                        <div class="text-primary fw-bold mb-2 fs-6">
                            <i class="fa-solid fa-list-ul me-1"></i> Chương <span th:text="${bm.chuong.soChuong}"></span>: <span th:text="${bm.chuong.tieuDe}"></span>
                        </div>

                        <div class="bg-light p-3 rounded-3 border-start border-4 border-warning mb-3 shadow-sm">
                            <i class="fa-solid fa-quote-left text-muted me-2 opacity-50"></i>
                            <span class="fst-italic text-secondary text-truncate-2" th:text="${bm.doanText}"></span>
                        </div>

                        <div class="d-flex flex-wrap align-items-center text-muted small fw-medium gap-3">
                            <span class="badge bg-success-subtle text-success border border-success-subtle px-3 py-2 fs-7 rounded-pill">
                                <i class="fa-solid fa-location-dot me-1"></i> Đã đọc <span th:text="${bm.phanTramDoc}"></span>%
                            </span>
                            <span><i class="fa-regular fa-clock me-1"></i> Đã lưu: <span th:text="${#temporals.format(bm.ngayCapNhat,'dd/MM/yyyy HH:mm')}"></span></span>
                        </div>
                    </div>

                    <div class="d-flex flex-row flex-md-column justify-content-center align-items-center gap-2 mt-3 mt-md-0 border-start-md ps-0 ps-md-4">
                        
                        <a class="btn btn-primary fw-bold rounded-pill w-100 py-2 shadow-sm"
                           th:href="@{/DustNovel/chuong/{id}(id=${bm.chuong.id}, offset=${bm.viTriKyTu})}">
                            <i class="fa-solid fa-book-open-reader me-1"></i> Đọc tiếp
                        </a>

                        <form th:action="@{/DustNovel/bookmark/delete/{id}(id=${bm.id})}" method="post" class="w-100 m-0">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-light text-danger border fw-bold rounded-pill w-100 py-2" onclick="return confirm('Bạn có chắc chắn muốn xóa dấu trang này không?')">
                                <i class="fa-solid fa-trash-can me-1"></i> Xóa
                            </button>
                        </form>
                        
                    </div>

                </div>

            </div>
        </div>
    </div>
</div>
