<div th:fragment="content">

    <h4>➕ Thêm chương cho tập: <span th:text="${tap.tenTap}"></span></h4>

    <form th:action="@{/DustNovel/chuong/them}" method="post" th:object="${chuong}">
        <input type="hidden" th:field="*{tap.id}"/>

        <div class="row">
            <div class="col-md-3 mb-3">
                <label class="form-label fw-bold">Số chương</label>
                <input type="number" th:field="*{soChuong}" class="form-control" placeholder="VD: 1" required>
                <div class="form-text">Hệ thống đã tự gợi ý số chương tiếp theo.</div>
            </div>

            <div class="col-md-9 mb-3">
                <label class="form-label fw-bold">Tiêu đề chương</label>
                <input type="text" th:field="*{tieuDe}" class="form-control" placeholder="Nhập tên chương..." required>
            </div>
        </div>

       <textarea name="noiDung"
          class="form-control"
          required
          minlength="1"
          placeholder="Nhập nội dung chương"
></textarea>

<div class="invalid-feedback">
    Nội dung chương ít nhất phải 1 ký tự
</div>

        <div class="mt-4">
            <button type="submit" class="btn btn-success px-4">💾 Lưu chương</button>
            <a th:href="@{/DustNovel/truyen/{id}(id=${truyen.id})}" class="btn btn-secondary px-4">Hủy</a>
        </div>
    </form>

</div>
