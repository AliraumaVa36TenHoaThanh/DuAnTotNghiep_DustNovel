<div th:fragment="muaModal(chap, currentUser)">
    <div class="modal fade"
         th:id="'muaChuongModal__' + ${chap.id}"
         tabindex="-1"
         aria-hidden="true">

        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title fw-bold text-dark">
                        Xác nhận mua chương
                    </h5>
                    <button type="button" class="btn-close"
                            data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body text-center text-dark">
                    <p class="mb-1">
                        Bạn đang mua:
                        <b th:text="${chap.tieuDe}"></b>
                    </p>

                    <!-- =================== CÓ PHIẾU =================== -->
                    <div th:if="${currentUser != null 
                        and currentUser.phieuThuong != null
                        and currentUser.phieuThuong.soLuong > 0}">

                        <div class="alert alert-success py-2">
                            🎟️ Bạn đang có
                            <b th:text="${currentUser.phieuThuong.soLuong}"></b>
                            phiếu thưởng
                        </div>

                        <p>Bạn muốn dùng <b>1 phiếu</b> để mở chương này không?</p>

                        <form th:action="@{/DustNovel/chuong/{id}/mua-phieu(id=${chap.id})}"
                              method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn btn-success w-100 mb-2">
                                ✅ Dùng phiếu
                            </button>
                        </form>

                        <hr class="my-2">

                        <p class="text-muted mb-1">
                            Hoặc mua bằng
                            <b th:text="${chap.giaToken}"></b> Token
                        </p>

                        <div class="bg-light p-2 rounded mb-2">
                            Số dư hiện tại:
                            <b class="text-primary">
                                <span th:text="${currentUser.token}"></span>
                            </b>
                            Token
                        </div>

                        <form th:action="@{/DustNovel/chuong/{id}/mua-token(id=${chap.id})}"
                              method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn btn-outline-danger w-100"
                                    th:disabled="${currentUser.token < chap.giaToken}">
                                💰 Mua bằng token
                            </button>
                        </form>
                    </div>

                    <!-- =================== KHÔNG CÓ PHIẾU =================== -->
                    <div th:unless="${currentUser != null 
                        and currentUser.phieuThuong != null
                        and currentUser.phieuThuong.soLuong > 0}">

                        <h4 class="text-danger fw-bold">
                            <span th:text="${chap.giaToken}"></span> Token
                        </h4>

                        <hr>

                        <div th:if="${currentUser != null}"
                             class="bg-light p-2 rounded">
                            Số dư hiện tại:
                            <b class="text-primary">
                                <span th:text="${currentUser.token}"></span>
                            </b>
                            Token
                        </div>
                    </div>
                </div>

                <div class="modal-footer">

                    <button type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">
                        Hủy
                    </button>

                    <!-- KHÔNG CÓ PHIẾU → MUA TOKEN -->
                    <form th:if="${currentUser != null 
                        and (currentUser.phieuThuong == null 
                        or currentUser.phieuThuong.soLuong == 0)}"
                          th:action="@{/DustNovel/chuong/{id}/mua(id=${chap.id})}"
                          method="post">

                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <button type="submit"
                                class="btn btn-danger px-4"
                                th:disabled="${currentUser.token < chap.giaToken}">
                            💰 Xác nhận mua
                        </button>
                    </form>

                    <a th:if="${currentUser == null}"
                       th:href="@{/DustNovel/login}"
                       class="btn btn-primary">
                        Đăng nhập
                    </a>

                </div>
            </div>
        </div>
    </div>
</div>
