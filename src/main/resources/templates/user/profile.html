
<div th:fragment="content">
	<div class="wrapper">

		<!-- ================= CROPPER ================= -->
<link href="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.css" rel="stylesheet">
<script src="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.js"></script>

<!-- Bootstrap Icons (nếu main chưa load thì mới giữ) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<!-- CSRF -->
<meta name="_csrf" th:content="${_csrf.token}">
<meta name="_csrf_header" th:content="${_csrf.headerName}">

<meta charset="UTF-8">
<title>Hồ sơ cá nhân</title>

<style>
:root {
	--bg: #0f1724;
	--muted: #6b7280;
	--accent1: #7c3aed;
	--accent2: #06b6d4;
}

html, body {
	height: 100%;
}

body {
	font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
	background: #f4f7fb;
	color: #0f1724;
}

/* ================= BANNER ================= */
.bg-dark.text-white.text-center.py-5 {
	position: relative;
	height: 260px;
	background-size: cover !important;
	background-position: center !important;
	display: flex;
	align-items: center;
	justify-content: center;
	transition: all .2s ease;
	border-radius: 12px;
	width: 108%;
    margin-left: -4%;
}

.bg-dark.text-white.text-center.py-5::before {
	content: "";
	position: absolute;
	inset: 0;
	background: linear-gradient(120deg, rgba(12, 18, 33, .6),
		rgba(6, 11, 26, .4));
	border-radius: 12px;
}

.bg-dark.text-white.text-center.py-5:hover {
	transform: translateY(-8px);
	box-shadow: 0 20px 40px rgba(0, 0, 0, .15);
}

.bg-dark.text-white.text-center.py-5:not([style]) {
    background: #6c757d !important;
}

.banner {
    width: 500vw;
    margin-left: calc(-50vw + 50%);
}

/* Banner overlay */
.banner-overlay {
	position: absolute;
	inset: 0;
	background: rgba(0, 0, 0, .3);
	border-radius: 12px;
	display: flex;
	align-items: center;
	justify-content: center;
	gap: 15px;
	opacity: 0;
	transition: .2s ease;
	z-index: 15;
	
}

.bg-dark.text-white.text-center.py-5:hover .banner-overlay {
	opacity: 1;
}

.banner-overlay .btn {
	width: 40px;
	height: 40px;
	padding: 0;
	border-radius: 50%;
	background: #fff;
	border: none;
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: 16px;
}

.banner-overlay .btn:hover {
	background: #f0f0f0;
}

.banner-overlay form {
	display: inline;
}

.banner-overlay form .btn {
	margin: 0;
   
}

/* Hide old banner buttons */
.bg-dark.text-white.text-center.py-5>.btn, .bg-dark.text-white.text-center.py-5>form .btn
	{
	display: none;
}

/* ================= AVATAR ================= */
.avatar-wrapper {
	position: relative;
	width: 120px;
	height: 120px;
	margin: auto;
	transition: all .2s ease;
}

.avatar-wrapper:hover {
	transform: translateY(-8px);
}

.avatar-img {
	width: 120px;
	height: 120px;
	border-radius: 50%;
	border: 4px solid #fff;
	box-shadow: 0 10px 30px rgba(0, 0, 0, .15);
}

/* overlay */
.avatar-overlay {
	position: absolute;
	inset: 0;
	background: rgba(0, 0, 0, .4);
	border-radius: 50%;
	display: flex;
	align-items: center;
	justify-content: center;
	gap: 10px;
	opacity: 0;
	transition: .2s ease;
}

.avatar-wrapper:hover .avatar-overlay {
	opacity: 1;
}

/* small grey buttons */
.avatar-overlay .btn,
.banner-overlay .btn {
	width: 34px;
	height: 34px;
	padding: 0;
	border-radius: 50%;
	background: #6c757d;
	border: none;
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: 14px;
}

.avatar-wrapper {
    position: relative;
    top: -55px;   /* chỉnh số này để lên cao hơn */
}

.avatar-overlay .btn:hover,
.banner-overlay .btn:hover {
	background: #5a6268;
}

/* ================= CARD ================= */
.card {
	border-radius: 14px;
	border: 1px solid rgba(0, 0, 0, .05);
	box-shadow: 0 10px 30px rgba(0, 0, 0, .05);
}

.card-body {
    margin: 60px;
    
}

.container.py-5 {
	margin-top: -110px;  
    position: relative;
    z-index: 5;
}

/* Disabled input */
.form-control:disabled {
	background: #fff;
	box-shadow: inset 0 0 0 1000px rgba(0, 0, 0, .05);
	font-weight: 600;
}

/* Responsive */
@media ( max-width :768px) {
	.bg-dark.text-white.text-center.py-5 {
		height: 200px;
	}
}

/* Làm card cao hơn */
.col-lg-4 .card, .col-lg-8 .card {
	min-height: 719px;
}


/* Button chung */
.btn{
  box-shadow: none !important;
    border-radius: 6px;
}

/* Đăng xuất */
.btn-dark{
  background: linear-gradient(135deg,#0f172a,#1e293b);
  border: none;
}

.btn-dark:hover{
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(0,0,0,.2);
}

/* Xóa tài khoản */
.btn-outline-danger{
  border: 2px solid #ef4444;
  color: #ef4444;
  background: transparent;
}

.btn-outline-danger:hover{
  background: #ef4444;
  color: white;
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(239,68,68,.25);
}

.btn-outline-primary{
  border: 2px solid #6366f1;
  color: #6366f1;
}

.btn-outline-primary:hover{
  background: linear-gradient(135deg,#6366f1,#7c3aed);
  color: white;
  border-color: transparent;
  transform: translateY(-3px);
}

.back-home-btn{
  text-decoration: none;
  font-weight: 600;
  color: #648f7b;
  padding: 6px 12px;
  border-radius: 8px;
  transition: all .2s ease;
}

.d-flex.justify-content-between {
    margin-top: 50px;
}

.col-lg-4 .card-body {
    margin-top: -20px;   
}

.col-lg-8 .card-body {
    margin-top: 10px;   
}


.btn-ma-thuong {
    display: inline-block;  
    margin-right: 470px;        
    text-align: center;
}

.btn-gold {
    font-size: 15px;     
    padding: 8px 20px;    
    border-radius: 20px; 
    position: relative;
    display: inline-block;
    padding: 10px 22px;
    font-weight: 600;
    border-radius: 8px;
    color: #fff !important;
    overflow: hidden;

    background: linear-gradient(135deg, #6b3f1d, #b07a2d, #e6c067, #b07a2d, #6b3f1d);
    background-size: 300% 300%;
    animation: goldMove 4s ease infinite;

    box-shadow: 0 0 15px rgba(230,192,103,0.6);
    transition: 0.3s;
}

/* lớp kim tuyến */
.btn-gold::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
        radial-gradient(circle, rgba(255,255,255,0.9) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.7) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.6) 2px, transparent 2px);

    background-size: 40px 40px, 60px 60px, 80px 80px;
    animation: sparkle 3s linear infinite;
    opacity: 0.6;
    pointer-events: none;
}

/* ánh sáng quét */
.btn-gold::after {
    content: "";
    position: absolute;
    top: 0;
    left: -80%;
    width: 50%;
    height: 100%;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.9),
        transparent
    );
    transform: skewX(-25deg);
    animation: shine 2.5s infinite;
}

@keyframes sparkle {
    0% { background-position: 0 0, 0 0, 0 0; }
    100% { background-position: 200px 200px, -150px 150px, 100px -100px; }
}

@keyframes shine {
    0% { left: -80%; }
    100% { left: 130%; }
}

@keyframes goldMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.btn-gold:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 25px rgba(230,192,103,1);
}

.username {
    margin-top: -45px;  
}

.signature-glitter {
    font-family: 'Satisfy', cursive;
    font-weight: normal;   
}

.signature-glitter-email {
    font-family: 'Satisfy', cursive;
    font-weight: normal;   
}

.btn-big {
    font-size: 15px;
    font-weight: 600;
    padding: 10px 28px;
    border-radius: 10px;
    transition: 0.3s ease;
}
</style>


<script>
	
	function enableEdit() {
	    document.querySelectorAll(".editable").forEach(i => i.disabled = false);
	    document.getElementById("btnUpdate").classList.remove("d-none");
	}
	
	window.onload = function () {
	    if (document.querySelector(".error")) {
	        enableEdit();
	    }
	}
	
	function confirmLogout() {
	    return confirm("Bạn có chắc chắn muốn đăng xuất không?");
	}
	
	function confirmDeleteAvatar() {
	    return confirm("Bạn có chắc chắn muốn xóa ảnh đại diện không?");
	}
	
	let cropper = null;
	let selectedFile = null;
	
	function openAvatarEditor(input) {
	    if (!input.files || !input.files[0]) return;
	
	    selectedFile = input.files[0];
	    const img = document.getElementById("previewAvatar");
	    img.src = URL.createObjectURL(selectedFile);
	
	    const modal = new bootstrap.Modal(document.getElementById('avatarModal'));
	    modal.show();
	
	    if (cropper) cropper.destroy();
	
	    img.onload = () => {
	        cropper = new Cropper(img, {
	            aspectRatio: 1,
	            viewMode: 1
	        });
	    };
	}
	
	function submitAvatar() {
	    if (!cropper) return;
	
	    cropper.getCroppedCanvas({ width: 400, height: 400 })
	    .toBlob(blob => {
	        const formData = new FormData();
	        formData.append("file", blob, "avatar.png");
	
	        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
	        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;
	
	        const headers = {};
	        if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;
	
	        fetch("/DustNovel/user/avatar", {
	            method: "POST",
	            body: formData,
	            headers: headers,
	            credentials: "same-origin"
	        })
	        .then(res => {
	            if (!res.ok) throw new Error();
	            location.reload();
	        })
	        .catch(() => alert("Lỗi khi cập nhật avatar"));
	    });
	}
	
	let bannerCropper = null;
	
	function openBannerEditor(input) {
	    if (!input.files || !input.files[0]) return;
	
	    const img = document.getElementById("previewBanner");
	    img.src = URL.createObjectURL(input.files[0]);
	
	    const modal = new bootstrap.Modal(document.getElementById('bannerModal'));
	    modal.show();
	
	    if (bannerCropper) bannerCropper.destroy();
	img.onload = () => {
	        bannerCropper = new Cropper(img, {
	            aspectRatio: 16 / 5,
	            viewMode: 1
	        });
	    };
	}
	
	function submitBanner() {
	    if (!bannerCropper) return;
	
	    bannerCropper.getCroppedCanvas({ width: 1600, height: 500 })
	    .toBlob(blob => {
	        const formData = new FormData();
	        formData.append("file", blob, "banner.jpg");
	
	        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
	        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;
	
	        const headers = {};
	        if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;
	
	        fetch("/DustNovel/user/banner", {
	            method: "POST",
	            body: formData,
	            headers: headers,
	            credentials: "same-origin"
	        })
	        .then(res => {
	            if (!res.ok) throw new Error();
	            location.reload();
	        })
	        .catch(() => alert("Lỗi upload banner"));
	    });
	}
	
</script>

		<!-- ================= BANNER ================= -->

		<div class="bg-dark text-white text-center py-5"
			th:style="${user.banner != null} ? 'background:url(' + @{${user.banner}} + ') center/cover no-repeat' : ''">

			<!-- Banner overlay buttons -->
			<div class="banner-overlay">
				<button class="btn"
					onclick="document.getElementById('bannerInput').click()">📷</button>

				<form th:if="${user.banner != null}"
					th:action="@{/DustNovel/user/banner/delete}" method="post"
					onsubmit="return confirm('Bạn có chắc chắn muốn xóa banner không?')">
					<button class="btn" type="submit">🗑️</button>
				</form>
			</div>

			<form th:action="@{/DustNovel/user/banner}" method="post"
				enctype="multipart/form-data">
				<input id="bannerInput" type="file" name="file" hidden
					accept="image/*" onchange="openBannerEditor(this)">
			</form>
		</div>

		<!-- ================= CONTENT ================= -->

		<div class="container py-5">
			<div class="row g-4">

				<!-- LEFT -->
				<div class="col-lg-4">
					<div class="card shadow-sm">
						<div class="card-body text-center">

							<div class="mb-3 avatar-wrapper mx-auto">

								<!-- Avatar chữ cái -->
								<div th:if="${user.avatar == null}"
									class="rounded-circle bg-secondary text-white d-flex align-items-center justify-content-center fs-2 avatar-img"
									th:text="${#strings.toUpperCase(#strings.substring(user.tenDangNhap,0,1))}">
								</div>

								<!-- Avatar hình -->
								<img th:if="${user.avatar != null}" th:src="@{${user.avatar}}"
									class="rounded-circle border border-3 avatar-img" width="120"
									height="120">

								<!-- Overlay khi hover -->
								<div class="avatar-overlay d-flex gap-2">

									<button type="button"
										class="btn btn-sm btn-secondary avatar-btn"
										onclick="document.getElementById('avatarInput').click()">
										📷</button>

									<form th:if="${user.avatar != null}"
										th:action="@{/DustNovel/user/avatar/delete}" method="post"
										onsubmit="return confirmDeleteAvatar()">
										<button type="submit"
											class="btn btn-sm btn-secondary avatar-btn">🗑️</button>
									</form>

								</div>

							</div>
							<input id="avatarInput" type="file" hidden accept="image/*"
								onchange="openAvatarEditor(this)">

							<h5 class="mb-3	 username  signature-glitter" th:text="${user.tenDangNhap}"></h5>
							<p class="text-muted signature-glitter-email" th:text="${user.email}"></p>
							<span class="badge bg-success-subtle text-success mb-4"><i class="bi bi-activity me-2"></i>
							Đang hoạt động</span>

							<div class="row border-top pt-3">
								<div class="col text-center">
									<strong>0</strong><br> <small>Truyện</small>
								</div>
								<div class="col text-center">
									<strong>0</strong><br> <small>Theo dõi</small>
								</div>
								<div class="col text-center">
									<strong>0</strong><br> <small>Bình luận</small>
								</div>
							</div>

							<div class="mt-4 d-grid gap-2">
								<form th:action="@{/DustNovel/user/delete}" method="post"
									onsubmit="return confirm('Bạn có chắc chắn muốn xóa tài khoản?')">
									<button class="btn btn-outline-primary w-100"><i class="bi bi-trash-fill me-2"></i>
									Xóa tài khoản</button>
								</form>

								<form th:action="@{/DustNovel/logout}" method="post"
									onsubmit="return confirmLogout()">
									<button class="btn btn-outline-danger w-100"><i class="bi bi-box-arrow-right me-2"></i>
									Đăng xuất</button>
								</form>
							</div>

						</div>
					</div>
				</div>

				<!-- RIGHT -->
				<div class="col-lg-8">
					<div class="card shadow-sm">
						<div class="card-body">

							<div
								class="d-flex justify-content-between align-items-center mb-4">
								<h4 class="mb-0">Thông tin tài khoản</h4>
								<button type="button" class="btn btn-success btn-big"   
									onclick="enableEdit()"><i class="bi bi-pencil-square me-2"></i>Thay đổi Email & Password</button>
							</div>

							<a href="/DustNovel/ma-thuong"
								class="d-block mb-3 text-decoration-none btn-gold  btn-ma-thuong text-center"> → Nhập mã thưởng
								← </a>

							<div th:if="${success != null and success == true}"
								class="alert alert-success">Cập nhật mật khẩu thành công</div>

							<form th:action="@{/DustNovel/user/profile/update}" method="post">

								<div class="mb-3">
									<label class="form-label">Tên đăng nhập</label> <input
										class="form-control" disabled
										th:value="${tenDangNhapValue != null ? tenDangNhapValue : user.tenDangNhap}">
									<input type="hidden" name="tenDangNhap"
										th:value="${tenDangNhapValue != null ? tenDangNhapValue : user.tenDangNhap}">
								</div>

								<div class="mb-3">
									<label class="form-label">Email</label> <input name="email"
										class="form-control editable" disabled
										th:value="${emailValue != null ? emailValue : user.email}">
									<div class="text-danger small error" th:if="${emailError}"
										th:text="${emailError}"></div>
								</div>

								<div class="mb-3">
									<label class="form-label">Đổi mật khẩu</label> <input
										type="password" name="matKhauMoi"
										class="form-control editable" disabled
										th:value="${matKhauMoi}">
									<div class="text-danger small error" th:if="${matKhauMoiError}"
										th:text="${matKhauMoiError}"></div>
								</div>

								<div class="mb-3">
									<input type="password" name="xacNhanMatKhau"
										class="form-control editable" disabled
										th:value="${xacNhanMatKhau}">
									<div class="text-danger small error"
										th:if="${xacNhanMatKhauError}"
										th:text="${xacNhanMatKhauError}"></div>
								</div>

								<div class="d-flex justify-content-between align-items-center">
									<button id="btnUpdate" type="submit"
										class="btn btn-success d-none btn-big"><i class="bi bi-person-check-fill"></i>
										Cập nhật Email & Password</button>
									<a href="/DustNovel/home" class="back-home-btn"> ← Quay về
										trang chủ </a>
								</div>

							</form>

						</div>
					</div>
				</div>

			</div>
		</div>

		<!-- ================= AVATAR MODAL ================= -->
		<div class="modal fade" id="avatarModal" tabindex="-1">
			<div class="modal-dialog modal-dialog-centered">
				<div class="modal-content">

					<div class="modal-body p-0">
						<div class="w-100 text-center">
							<img id="previewAvatar" class="w-100 d-block">
						</div>
					</div>

					<div class="modal-footer">
						<button type="button" class="btn btn-secondary"
							data-bs-dismiss="modal">Đóng</button>
						<button type="button" class="btn btn-primary"
							onclick="submitAvatar()">Đổi ảnh</button>
					</div>

				</div>
			</div>
		</div>


		<!-- ================= BANNER MODAL ================= -->
		<div class="modal fade" id="bannerModal" tabindex="-1">
			<div class="modal-dialog modal-xl modal-dialog-centered">
				<div class="modal-content">

					<div class="modal-body p-0">
						<div class="w-100">
							<img id="previewBanner" class="w-100 d-block">
						</div>
					</div>

					<div class="modal-footer">
						<button type="button" class="btn btn-secondary"
							data-bs-dismiss="modal">Đóng</button>
						<button type="button" class="btn btn-primary"
							onclick="submitBanner()">Đổi banner</button>
					</div>

				</div>
			</div>
		</div>

	</div>
</div>
