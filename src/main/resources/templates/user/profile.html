<div th:fragment="content">
<div class="wrapper">

<!-- ================= BOOTSTRAP ================= -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- ================= CROPPER ================= -->
<link href="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.css" rel="stylesheet">
<script src="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.js"></script>

<meta name="_csrf" th:content="${_csrf.token}">
<meta name="_csrf_header" th:content="${_csrf.headerName}">
<meta charset="UTF-8">
<title>Hồ sơ cá nhân</title>



<script>

function enableEdit() {
    document.querySelectorAll(".editable").forEach(i => i.disabled = false);
    document.getElementById("btnUpdate").classList.remove("d-none");
}

window.onload = function () {
    if (document.querySelector(".error")) {
        enableEdit();
    }
}

function confirmLogout() {
    return confirm("Bạn có chắc chắn muốn đăng xuất không?");
}

function confirmDeleteAvatar() {
    return confirm("Bạn có chắc chắn muốn xóa ảnh đại diện không?");
}

let cropper = null;
let selectedFile = null;

function openAvatarEditor(input) {
    if (!input.files || !input.files[0]) return;

    selectedFile = input.files[0];
    const img = document.getElementById("previewAvatar");
    img.src = URL.createObjectURL(selectedFile);

    const modal = new bootstrap.Modal(document.getElementById('avatarModal'));
    modal.show();

    if (cropper) cropper.destroy();

    img.onload = () => {
        cropper = new Cropper(img, {
            aspectRatio: 1,
            viewMode: 1
        });
    };
}

function submitAvatar() {
    if (!cropper) return;

    cropper.getCroppedCanvas({ width: 400, height: 400 })
    .toBlob(blob => {
        const formData = new FormData();
        formData.append("file", blob, "avatar.png");

        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

        const headers = {};
        if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;

        fetch("/DustNovel/user/avatar", {
            method: "POST",
            body: formData,
            headers: headers,
            credentials: "same-origin"
        })
        .then(res => {
            if (!res.ok) throw new Error();
            location.reload();
        })
        .catch(() => alert("Lỗi khi cập nhật avatar"));
    });
}

let bannerCropper = null;

function openBannerEditor(input) {
    if (!input.files || !input.files[0]) return;

    const img = document.getElementById("previewBanner");
    img.src = URL.createObjectURL(input.files[0]);

    const modal = new bootstrap.Modal(document.getElementById('bannerModal'));
    modal.show();

    if (bannerCropper) bannerCropper.destroy();
img.onload = () => {
        bannerCropper = new Cropper(img, {
            aspectRatio: 16 / 5,
            viewMode: 1
        });
    };
}

function submitBanner() {
    if (!bannerCropper) return;

    bannerCropper.getCroppedCanvas({ width: 1600, height: 500 })
    .toBlob(blob => {
        const formData = new FormData();
        formData.append("file", blob, "banner.jpg");

        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

        const headers = {};
        if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;

        fetch("/DustNovel/user/banner", {
            method: "POST",
            body: formData,
            headers: headers,
            credentials: "same-origin"
        })
        .then(res => {
            if (!res.ok) throw new Error();
            location.reload();
        })
        .catch(() => alert("Lỗi upload banner"));
    });
}

</script>

<!-- ================= BANNER ================= -->

<div class="bg-dark text-white text-center py-5"
     th:style="${user.banner != null} ? 'background:url(' + @{${user.banner}} + ') center/cover no-repeat' : ''">

    <button class="btn btn-light btn-sm"
            onclick="document.getElementById('bannerInput').click()">📷 Đổi banner</button>

    <form th:if="${user.banner != null}"
          th:action="@{/DustNovel/user/banner/delete}"
          method="post"
          class="d-inline"
          onsubmit="return confirm('Bạn có chắc chắn muốn xóa banner không?')">
        <button class="btn btn-danger btn-sm">🗑️</button>
    </form>

    <form th:action="@{/DustNovel/user/banner}" method="post" enctype="multipart/form-data">
        <input id="bannerInput" type="file" name="file" hidden
               accept="image/*" onchange="openBannerEditor(this)">
    </form>
</div>

<!-- ================= CONTENT ================= -->

<div class="container py-5">
<div class="row g-4">

<!-- LEFT -->
<div class="col-lg-4">
<div class="card shadow-sm">
<div class="card-body text-center">

<div class="mb-3">
<div th:if="${user.avatar == null}"
     class="rounded-circle bg-secondary text-white d-flex align-items-center justify-content-center mx-auto fs-2"
     style="width:120px;height:120px;"
     th:text="${#strings.toUpperCase(#strings.substring(user.tenDangNhap,0,1))}">
</div>

<img th:if="${user.avatar != null}"
     th:src="@{${user.avatar}}"
     class="rounded-circle border border-3"
     width="120" height="120">
</div>

<button class="btn btn-outline-primary btn-sm mb-2"
        onclick="document.getElementById('avatarInput').click()">📷 Đổi ảnh</button>

<form th:if="${user.avatar != null}"
      th:action="@{/DustNovel/user/avatar/delete}"
      method="post"
      onsubmit="return confirmDeleteAvatar()">
    <button class="btn btn-danger btn-sm">🗑️ Xóa ảnh</button>
</form>
<input id="avatarInput" type="file" hidden accept="image/*"
       onchange="openAvatarEditor(this)">

<h5 class="mt-3 mb-0" th:text="${user.tenDangNhap}"></h5>
<p class="text-muted" th:text="${user.email}"></p>
<span class="badge bg-success mb-3">Đang hoạt động</span>

<div class="row border-top pt-3">
<div class="col text-center">
<strong>0</strong><br><small>Truyện</small>
</div>
<div class="col text-center">
<strong>0</strong><br><small>Theo dõi</small>
</div>
<div class="col text-center">
<strong>0</strong><br><small>Bình luận</small>
</div>
</div>

<div class="mt-4 d-grid gap-2">
<form th:action="@{/DustNovel/user/delete}" method="post"
      onsubmit="return confirm('Bạn có chắc chắn muốn xóa tài khoản?')">
<button class="btn btn-outline-danger w-100">Xóa tài khoản</button>
</form>

<form th:action="@{/DustNovel/logout}" method="post"
      onsubmit="return confirmLogout()">
<button class="btn btn-dark w-100">Đăng xuất</button>
</form>
</div>

</div>
</div>
</div>

<!-- RIGHT -->
<div class="col-lg-8">
<div class="card shadow-sm">
<div class="card-body">

<div class="d-flex justify-content-between align-items-center mb-4">
<h4 class="mb-0">Thông tin tài khoản</h4>
<button type="button" class="btn btn-outline-primary btn-sm"
        onclick="enableEdit()">Thay đổi mật khẩu</button>
</div>

<a href="/DustNovel/ma-thuong" class="d-block mb-3 text-decoration-none">
→ Nhập mã thưởng ←
</a>

<div th:if="${success != null and success == true}"
     class="alert alert-success">
Cập nhật mật khẩu thành công
</div>

<form th:action="@{/DustNovel/user/profile/update}" method="post">

<div class="mb-3">
<label class="form-label">Tên đăng nhập</label>
<input class="form-control" disabled
       th:value="${tenDangNhapValue != null ? tenDangNhapValue : user.tenDangNhap}">
<input type="hidden" name="tenDangNhap"
       th:value="${tenDangNhapValue != null ? tenDangNhapValue : user.tenDangNhap}">
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input name="email" class="form-control editable" disabled
       th:value="${emailValue != null ? emailValue : user.email}">
<div class="text-danger small error"
     th:if="${emailError}" th:text="${emailError}"></div>
</div>

<div class="mb-3">
<label class="form-label">Đổi mật khẩu</label>
<input type="password" name="matKhauMoi"
       class="form-control editable" disabled
       th:value="${matKhauMoi}">
<div class="text-danger small error"
     th:if="${matKhauMoiError}" th:text="${matKhauMoiError}"></div>
</div>

<div class="mb-3">
<input type="password" name="xacNhanMatKhau"
       class="form-control editable" disabled
       th:value="${xacNhanMatKhau}">
<div class="text-danger small error"
     th:if="${xacNhanMatKhauError}" th:text="${xacNhanMatKhauError}"></div>
</div>

<div class="d-flex justify-content-between align-items-center">
<button id="btnUpdate" type="submit"
        class="btn btn-primary d-none">
Cập nhật mật khẩu
</button>
<a href="/DustNovel/home">← Quay về trang chủ</a>
</div>

</form>

</div>
</div>
</div>

</div>
</div>

<!-- ================= AVATAR MODAL ================= -->
<div class="modal fade" id="avatarModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-body p-0">
        <div class="w-100 text-center">
          <img id="previewAvatar" class="w-100 d-block">
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Đóng
        </button>
        <button type="button" class="btn btn-primary" onclick="submitAvatar()">
          Đổi ảnh
        </button>
      </div>

    </div>
  </div>
</div>


<!-- ================= BANNER MODAL ================= -->
<div class="modal fade" id="bannerModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-body p-0">
        <div class="w-100">
          <img id="previewBanner" class="w-100 d-block">
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Đóng
        </button>
        <button type="button" class="btn btn-primary" onclick="submitBanner()">
          Đổi banner
        </button>
      </div>

    </div>
  </div>
</div>

</div>
</div>
