<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Nhập Giftcode</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body style="background-color: #f8fafc;">

<div th:fragment="content">
    
    <style>
        /* Hiệu ứng nền chìm đằng sau Form */
        .giftcode-wrapper {
            background-image: radial-gradient(circle at top right, #e0e7ff 0%, transparent 40%),
                              radial-gradient(circle at bottom left, #fae8ff 0%, transparent 40%);
            min-height: 70vh;
            display: flex;
            align-items: center;
        }

        /* Thẻ Card hiện đại */
        .gift-card {
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }
        .gift-card:hover {
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.12);
        }

        /* Icon Hộp quà bứt phá khỏi khung + Hiệu ứng bay lơ lửng */
        .floating-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 99%, #FECFEF 100%);
            border-radius: 25%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -45px auto 20px auto; /* Kéo icon lên trên viền card */
            box-shadow: 0 10px 20px rgba(255, 154, 158, 0.4);
            animation: float 3s ease-in-out infinite;
            border: 4px solid #fff;
        }
        .floating-icon i {
            font-size: 2.8rem;
            color: #fff;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Ô nhập code xịn xò */
        .code-input-group {
            position: relative;
        }
        .code-input {
            letter-spacing: 4px;
            border: 2px dashed #a5b4fc;
            background-color: #f8fafc;
            color: #4338ca;
            font-size: 1.25rem;
            transition: all 0.3s;
        }
        .code-input:focus {
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            border-color: #6366f1;
            background-color: #fff;
            transform: scale(1.02);
        }
        .code-input::placeholder {
            letter-spacing: 1px;
            color: #94a3b8;
            font-size: 1rem;
        }

        /* Nút bấm Đổi Quà (Có hiệu ứng quét sáng chớp nhoáng) */
        .btn-claim {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            color: white;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        .btn-claim::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: all 0.5s;
            z-index: -1;
        }
        .btn-claim:hover::before {
            left: 100%;
        }
        .btn-claim:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
            color: white;
        }

        /* Làm đẹp thanh Alert thông báo */
        .alert-custom {
            border-left: 5px solid;
        }
        .alert-success-custom { border-color: #10b981; background-color: #d1fae5; color: #065f46; }
        .alert-danger-custom { border-color: #ef4444; background-color: #fee2e2; color: #991b1b; }
    </style>

    <div class="giftcode-wrapper py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                    
                    <div class="card gift-card mt-5">
                        <div class="card-body px-4 pb-5 text-center">
                            
                            <div class="floating-icon">
                                <i class="fa-solid fa-gift"></i>
                            </div>
                            
                            <h2 class="fw-bold mb-2" style="color: #1e293b;">Đổi Mã Thưởng</h2>
                            <p class="text-muted mb-4 px-2" style="font-size: 0.95rem;">Nhập ngay Giftcode để nhận hàng ngàn phiếu thưởng đọc truyện thả ga!</p>

                            <div th:if="${successMsg}" class="alert alert-custom alert-success-custom text-start fw-bold rounded-3 shadow-sm mb-4" role="alert">
                                <i class="fa-solid fa-circle-check me-2 fs-5 align-middle"></i><span class="align-middle" th:text="${successMsg}"></span>
                            </div>
                            <div th:if="${errorMsg}" class="alert alert-custom alert-danger-custom text-start fw-bold rounded-3 shadow-sm mb-4" role="alert">
                                <i class="fa-solid fa-triangle-exclamation me-2 fs-5 align-middle"></i><span class="align-middle" th:text="${errorMsg}"></span>
                            </div>

                            <form th:action="@{/DustNovel/nhap-code}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                
                                <div class="mb-4 code-input-group">
                                    <input type="text" name="code" 
                                           class="form-control form-control-lg text-center text-uppercase fw-bold code-input py-3 rounded-4" 
                                           placeholder="NHẬP MÃ TẠI ĐÂY" required autocomplete="off">
                                </div>

                                <button type="submit" class="btn btn-claim btn-lg w-100 fw-bold rounded-pill py-3 mt-2">
                                    XÁC NHẬN ĐỔI QUÀ <i class="fa-solid fa-wand-magic-sparkles ms-2"></i>
                                </button>
                            </form>

                        </div>
                    </div>

                    <div class="text-center mt-4 text-muted fw-medium" style="font-size: 0.85rem; opacity: 0.8;">
                        <i class="fa-solid fa-shield-halved me-1"></i> Giao dịch an toàn • Mỗi mã áp dụng 1 lần/tài khoản.
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
