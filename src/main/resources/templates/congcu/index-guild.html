<div xmlns:th="http://www.thymeleaf.org"
     th:fragment="content" class="container mt-4">
     
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
     
<style>
/* ===== DROPDOWN CHA ===== */
.custom-dropdown {
    position: relative;
    width: 270px;
}

/* ===== PINK TABLE THEME ===== */
.table-pink {
    border: 3px solid #d63384;
}
.table-pink th {
    background-color: #d63384;
    color: #fff;
    border-color: #d63384;
}
.table-pink td, .table-pink th {
    border-color: #d63384;
}
.table-pink tbody tr:nth-child(odd) {
    background-color: #ffe6f1;
}
.table-pink tbody tr:hover {
    background-color: #ffcce4;
}

/* ===== PINK BUTTONS & BADGES ===== */
.btn-success,
.btn-danger {
    background-color: #d63384 !important;
    border-color: #d63384 !important;
    color: #fff !important;
}
.btn-success:hover,
.btn-danger:hover {
    background-color: #c82375 !important;
    border-color: #c82375 !important;
}
.badge.bg-success {
    background-color: #d63384 !important;
}

/* ===== PINK ALERTS ===== */
.alert-warning {
    background-color: #ffe6f1 !important;
    border-color: #d63384 !important;
    color: #000 !important;
}
.alert-info {
    background-color: #ffe6f1 !important;
    border-color: #d63384 !important;
    color: #000 !important;
}


/* ===== NÚT ===== */
.custom-toggle {
    width: 100%;
    height: 48px;
    border-radius: 4px;
    text-align: left;
    padding: 0 16px;
    border: 1px solid;
}

/* ===== MENU ===== */
.custom-menu {
    position: absolute !important;
    top: 60px;
    left: 0;
    width: 104%;
    border-radius: 6px;
    padding: 0;
    overflow: hidden; /* cắt nền tràn */
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* ===== ITEM ===== */
.custom-menu .dropdown-item {
    height: 48px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    background: transparent;
    border: none;
}

/* ===== XÓA NHÓM LUÔN ĐỎ ===== */
.custom-item-danger,
.custom-item-danger i {
    color: #dc3545 !important;
}

/* ============================= */
/* ===== LIGHT MODE ===== */
/* ============================= */

[data-theme="light"] .custom-toggle {
    background: #ffffff;
    border-color: #000000;
    color: #000000;
}

[data-theme="light"] .custom-menu {
    background: #ffffff;
    border: 1px solid #000000;
}

/* ============================= */
/* ===== DARK MODE ===== */
/* ============================= */

[data-theme="dark"] .custom-toggle {
    background: #1e1e1e;
    border-color: #ffffff;
    color: #ffffff;
}

[data-theme="dark"] .custom-menu {
    background: #1e1e1e;
    border: 1px solid #ffffff;
}




[data-theme="dark"] .table-pink td {
    background-color: #1e1e1e !important;
    color: #d63384 !important;
    border-color: #444 !important;
}

button[type="submit"]:hover {
    background: transparent !important;
}

button[type="submit"]:focus {
    background: transparent !important;
    box-shadow: none !important;
}

button[type="submit"]:active {
    background: transparent !important;
}


/* ===== PINK TEXT NEXT TO ALL CONTENT ===== */
.container,
.container p,
.container strong,
.container h4,
.container td,
.table-pink td {
    color: #d63384 !important;
}

/* ===== PINK MANAGEMENT BUTTON & MENU ===== */
.custom-toggle,
.custom-menu {
    border-color: #d63384 !important;
    color: #d63384 !important;
}
.text-danger {
    --bs-text-opacity: 1;
    color: #db2f84 !important;
}

.custom-menu .dropdown-item {
    color: #d63384 !important;
}

</style>
    <!--  
    <h2 th:text="${nhom.tenNhom}"></h2>
    -->
    
    <div class="d-flex justify-content-between align-items-center">

    <h2 class="mb-3" th:text="${nhom.tenNhom}"></h2>
    
        <!-- Dropdown rời nhóm -->
    <div class="ms-3"
         th:if="${!laTruongNhom
                and #authentication.authorities.?[authority=='ROLE_ADMIN'].size() == 0
                and #lists.contains(
                    danhSachThanhVien.![nguoiDung.id],
                    #authentication.principal.id
                )}">
       
                <form th:action="@{/DustNovel/nhom-dich/roi-nhom/{id}(id=${nhom.id})}"
                      method="post"
                       onsubmit="return confirm('Bạn có chắc chắn muốn rời khỏi nhóm không?');">

                    <button type="submit"
                            class="dropdown-item text-danger">
                           <i class="bi bi-box-arrow-right me-2"></i>
                          Rời khỏi nhóm
                     </button>

                </form>
    </div>

    <div th:if="${laTruongNhom or #authentication.authorities.?[authority=='ROLE_ADMIN'].size() > 0}" class="dropdown">

        <button class="custom-toggle dropdown-toggle"
                type="button"
                data-bs-toggle="dropdown">

            <i class="bi bi-gear-fill me-2"></i>
            Quản lý nhóm

        </button>

        <ul class="dropdown-menu custom-menu">

            <li>
                <form th:action="@{/DustNovel/nhom-dich/xoa/{id}(id=${nhom.id})}"
                      method="post"
                      onsubmit="return confirm('Bạn có chắc chắn muốn xóa nhóm này không?');">

                    <button type="submit"
                            class="dropdown-item custom-item-danger">

                        <i class="bi bi-trash3 me-2"></i>
                        Xóa nhóm

                    </button>

                </form>
            </li>
            
            <li th:if="${#authentication.authorities.?[authority=='ROLE_ADMIN'].size() > 0
                        and !laTruongNhom
                        and #lists.contains(
                            danhSachThanhVien.![nguoiDung.id],
                            #authentication.principal.id
                        )}">
                <form th:action="@{/DustNovel/nhom-dich/roi-nhom/{id}(id=${nhom.id})}"
                      method="post"
                      onsubmit="return confirm('Bạn có chắc chắn muốn rời khỏi nhóm không?');">

                    <button type="submit"
                            class="dropdown-item text-danger">
                        <i class="bi bi-box-arrow-right me-2"></i>
                        Rời khỏi nhóm
                    </button>

                </form>
            </li>

        </ul>
    </div>

</div>
    
        <strong>Trưởng nhóm:</strong>
        <span th:text="${nhom.truongNhom.tenDangNhap}"></span>
    </p>

    <p>
        <strong>Mô tả:</strong>
        <span th:text="${nhom.moTa}"></span>
    </p>
	<div class="mt-3"
	     th:if="${!laTruongNhom}">

	    <!-- Nếu chưa gửi yêu cầu -->
	    <form th:if="${!daGuiYeuCau}"
	          th:action="@{/DustNovel/nhom-dich/{id}/yeu-cau(id=${nhom.id})}"
	          method="post">

	        <button class="btn btn-success">
                <i class="bi bi-person-plus-fill me-1"></i>Yêu cầu tham gia

	    </form>

	    <!-- Nếu đã gửi -->
	    <div th:if="${daGuiYeuCau and !#lists.contains(
                 danhSachThanhVien.![nguoiDung.id], 
                 #authentication.principal.id
             )}"
	         class="alert alert-warning mt-2">
	        ⏳ Bạn đã gửi yêu cầu, đang chờ duyệt.
	    </div>

	</div>
    <hr>

	<h4><i class="bi bi-people-fill me-2"></i>Thành viên</h4>

	<!-- Nếu có thành viên -->
	<div th:if="${!#lists.isEmpty(danhSachThanhVien)}">

	    <table class="table table-bordered table-pink mt-3">
	        <thead>
	        <tr>
	            <th>Tên</th>
	            <th>Vai trò</th>
	            <th>Kick thành viên</th>
	        </tr>
	        </thead>

	        <tbody>
	        <tr th:each="tv : ${danhSachThanhVien}">
	            <td th:text="${tv.nguoiDung.tenDangNhap}"></td>
	            <td th:text="${tv.vaiTro == 'TRUONG_NHOM' ? 'Trưởng nhóm' 
                              : (tv.vaiTro == 'THANH_VIEN' ? 'Thành viên' 
                              : 'Đã duyệt')}">
                          </td>
				<td>

				    <!-- Nếu là trưởng nhóm và không phải chính mình -->
				    <div th:if="${laTruongNhom and tv.nguoiDung.id != nhom.truongNhom.id}">

				        <form th:action="@{/DustNovel/nhom-dich/kick/{id}(id=${tv.id})}"
				              method="post"
				              style="display:inline;">

				            <input type="hidden" name="nhomId"
				                   th:value="${nhom.id}" />

				            <button class="btn btn-danger btn-sm">
                                <i class="bi bi-person-x-fill"></i> Kick

				        </form>

				    </div>

				    <!-- Nếu không phải trưởng nhóm -->
				    <div th:if="${!laTruongNhom or tv.nguoiDung.id == nhom.truongNhom.id}">
				        <span th:text="${tv.trangThai == 'DA_DUYET' ? 'Đã duyệt' 
                                      : (tv.trangThai == 'CHO_DUYET' ? 'Chờ duyệt' 
                                      : 'Bị từ chối')}">
                       </span>
				    </div>

				</td>
	        </tr>
	        </tbody>
	    </table>
	</div>

	<!-- Nếu không có -->
	<div th:if="${#lists.isEmpty(danhSachThanhVien)}"
	     class="alert alert-info">
	    Chưa có thành viên nào.
	</div>
	<div th:if="${laTruongNhom}" class="mt-5">

	    <h4><i class="bi bi-envelope-fill me-2"></i>Yêu cầu tham gia</h4>

<table class="table table-bordered table-pink mt-3"
	           th:if="${!#lists.isEmpty(danhSachYeuCau)}">

	        <thead class="table-pink">
	        <tr>
	            <th>Tên người gửi</th>
	            <th>Ngày gửi</th>
	            <th>Hành động</th>
	        </tr>
	        </thead>

	        <tbody>
	        <tr th:each="yc : ${danhSachYeuCau}">
	            <td th:text="${yc.nguoiMoi.tenDangNhap}"></td>
	            <td th:text="${#temporals.format(yc.ngayMoi, 'dd/MM/yyyy HH:mm')}"></td>
	            <td>

	                <form th:action="@{/DustNovel/nhom-dich/duyet/{id}(id=${yc.id})}"
	                      method="post"
	                      style="display:inline;">
	                    <input type="hidden" name="nhomId"
	                           th:value="${nhom.id}" />
	                    <button class="btn btn-success btn-sm">
                        <i class="bi bi-check-circle-fill me-1"></i>Duyệt
	                    </button>
	                </form>

	                <form th:action="@{/DustNovel/nhom-dich/tu-choi/{id}(id=${yc.id})}"
	                      method="post"
	                      style="display:inline;">
	                    <input type="hidden" name="nhomId"
	                           th:value="${nhom.id}" />
	                    <button class="btn btn-danger btn-sm">
                        <i class="bi bi-x-circle-fill me-1"></i>Từ chối
	                    </button>
	                </form>

	            </td>
	        </tr>
	        </tbody>
	    </table>

	    <div th:if="${#lists.isEmpty(danhSachYeuCau)}"
	         class="alert alert-info mt-2">
	        Không có yêu cầu nào.
	    </div>

	</div>
</div>
