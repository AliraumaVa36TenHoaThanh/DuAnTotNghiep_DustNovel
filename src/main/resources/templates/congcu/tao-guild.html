<div xmlns:th="http://www.thymeleaf.org"
     th:fragment="content"
     class="container mt-4 create-group-page">
     
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* ===== CHỮ LUÔN MÀU HỒNG ===== */
.container.mt-4 h2,
.container.mt-4 .form-label {
    color: #ff4da6;
    font-weight: 600;
}

[data-theme="dark"] .create-group-page .form-control {
    background: #1e1e1e;
    color: white;
    border: 1px solid #444;
}
[data-theme="dark"] .form-control:focus {
    border-color: #ff4da6;
    box-shadow: 0 0 0 0.15rem rgba(255,77,166,.25);
}
/* ===== DARK MODE - VIỀN HỒNG INPUT ===== */
[data-theme="dark"] .create-group-page .form-control {
    background: #1e1e1e;
    color: #ff4da6;
    border: 1px solid #ff4da6;   /* viền hồng */
}

/* Khi focus */
[data-theme="dark"] .create-group-page .form-control:focus {
    border-color: #ff4da6;
    box-shadow: 0 0 0 0.2rem rgba(255,77,166,0.35);
    background: #1e1e1e;
    color: #ff4da6;
}

/* ===== DARK MODE - VIỀN HỒNG INPUT ===== */
[data-theme="light"] .create-group-page .form-control {
    color: #ff4da6;
    border: 1px solid #ff4da6;   /* viền hồng */
}

/* Khi focus */
[data-theme="light"] .create-group-page .form-control:focus {
    box-shadow: 0 0 0 0.2rem rgba(255,77,166,0.35);
    background: white;
    color: #ff4da6;
}
.create-group-page .form-control::placeholder {
    color: rgba(255,77,166,0.5);
}

/* ===== PINK PASTEL BUTTON ===== */
.btn-soft-pink {
    background-color: #ffb6d9 !important;   /* hồng nhạt */
    border: 1px solid #ffb6d9 !important;
    color: #8b004f !important;
    font-weight: 600;
    transition: all 0.3s ease;
}

.btn-soft-pink:hover {
    background-color: #ff8fca !important;
    border-color: #ff8fca !important;
    box-shadow: 0 0 10px rgba(255,182,217,0.6);
    transform: translateY(-2px);
}

/* ===== OUTLINE VERSION ===== */
.btn-soft-pink-outline {
    background-color: #ffb6d9 !important;   /* hồng nhạt */
    border: 1px solid #ffb6d9 !important;
    color: #8b004f !important;
    font-weight: 600;
    transition: all 0.3s ease;
}

.btn-soft-pink-outline:hover {
    background-color: #ff8fca !important;
    border-color: #ff8fca !important;
    box-shadow: 0 0 10px rgba(255,182,217,0.6);
    transform: translateY(-2px);
}

</style>

    <h2 class="mb-4"><i class="bi bi-stars me-2"></i> Tạo nhóm dịch mới</h2>

    <form th:action="@{/DustNovel/dang-ky-nhom}" method="post">

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-people-fill me-2"></i>Tên nhóm</label>
            <input type="text"
                   name="tenNhom"
                   class="form-control"
                   placeholder="Ví dụ : abc"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-card-text me-2"></i>Mô tả</label>
            <textarea name="moTa"
                      class="form-control"
                      rows="4"
                      placeholder="Ví dụ : abc"
                      required></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-soft-pink">
        <i class="bi bi-rocket-takeoff-fill me-2"></i>
             Tạo nhóm ngay
        </button>

        <a th:href="@{/DustNovel/nhom-dich}"
           class="btn btn-secondary btn-soft-pink-outline ms-2">
           <i class="bi bi-x-circle-fill me-2"></i>
            Huỷ
        </a>

    </form>

</div>
