<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content" class="container mt-4">

    <h3>Nạp / Tặng Token</h3>

    <p><b>Tên người dùng:</b> 
        <span th:text="${user.tenDangNhap}"></span>
    </p>

    <p><b>Số token hiện có:</b> 
        <span th:text="${user.token}"></span>
    </p>

    <hr>

    <!-- ===== THÔNG BÁO ===== -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- ===================================================== -->
    <!-- =================== NẠP TIỀN ======================== -->
    <!-- ===================================================== -->

    <h5>Nạp tiền qua chuyển khoản</h5>

    <form th:action="@{/DustNovel/nap-tien/nap}" method="post">
		
        <input type="number"
               name="soToken"
               class="form-control mb-2"
               placeholder="Nhập số tiền muốn nạp (VNĐ)"
               required>

        <button class="btn btn-success">Xác nhận</button>
    </form>

    <!-- ===== HIỂN THỊ QR ===== -->
    <div th:if="${soTien != null}" class="mt-4 text-center">

        <hr>

        <h5>Quét mã để chuyển khoản</h5>

        <p><b>Ngân hàng:</b> MB Bank</p>
        <p><b>Số tài khoản:</b> 0705722973</p>

        <p>
            <b>Số tiền:</b> 
            <span th:text="${soTien}"></span> VNĐ
        </p>

        <p>
            <b>Nội dung chuyển khoản:</b><br>
            <span class="text-primary fw-bold"
                  th:text="${noiDung}">
            </span>
        </p>

        <img th:src="'https://img.vietqr.io/image/MB-0705722973-compact.png?amount=' 
                    + ${soTien} + '&addInfo=' + ${noiDung}"
             width="300"
             class="img-fluid border p-2">

        <p class="text-danger mt-3">
            Sau khi chuyển khoản vui lòng chờ admin xác nhận.
        </p>

		<form th:action="@{/DustNovel/nap-tien/xac-nhan}" method="post">
		

		    <input type="hidden" name="soTien" th:value="${soTien}">
		    <input type="hidden" name="noiDung" th:value="${noiDung}">

		    <button type="submit"
		            style="margin-top:15px;
		                   padding:10px 18px;
		                   background:#0d6efd;
		                   color:white;
		                   border:none;
		                   border-radius:6px;
		                   cursor:pointer;">
		        Tôi đã chuyển khoản
		    </button>

		</form>
    </div>

    <hr>

    <!-- ===================================================== -->
    <!-- =================== TẶNG TOKEN ====================== -->
    <!-- ===================================================== -->

    <h5>Tặng token</h5>

    <div class="mb-2">
        <b>Gợi ý:</b>
        <span th:each="u : ${randomUsers}"
              th:text="${u.tenDangNhap}"
              onclick="chonNguoiNhan(this)"
              style="cursor:pointer"
              class="badge bg-secondary me-1">
        </span>
    </div>

    <form th:action="@{/DustNovel/nap-tien/tang}" method="post">

        <input type="text"
               id="nguoiNhan"
               name="nguoiNhan"
               class="form-control mb-2"
               placeholder="Tên người nhận"
               required>

        <input type="number"
               name="soToken"
               class="form-control mb-2"
               placeholder="Số token"
               required>

        <input type="password"
               name="matKhau"
               class="form-control mb-2"
               placeholder="Mật khẩu xác nhận"
               required>

        <button class="btn btn-warning">Tặng</button>
    </form>

</div>

<script>
    function chonNguoiNhan(el) {
        document.getElementById("nguoiNhan").value = el.innerText;

        document.querySelectorAll(".badge").forEach(b => {
            b.classList.remove("bg-primary");
            b.classList.add("bg-secondary");
        });

        el.classList.remove("bg-secondary");
        el.classList.add("bg-primary");
    }
</script>

</body>
</html>
