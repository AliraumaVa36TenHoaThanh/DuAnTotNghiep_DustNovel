<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/main :: content">
<div th:fragment="content">

    <style>
        /* Navigation layout */
        .chapter-nav {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .nav-left { justify-self: start; }
        .nav-center { justify-self: center; }
        .nav-right { justify-self: end; }

        /* Sidebar danh sách chương */
        #chapter-list {
            position: fixed;
            top: 0;
            left: 0;
            width: 300px;
            height: 100vh;
            background: #1a1a1a;
            border-right: 1px solid #333;
            z-index: 1050;
            padding: 20px;
            transition: 0.3s;
            overflow-y: auto; /* Thêm cuộn cho sidebar */
        }

        .chapter-item {
            display: block;
            padding: 10px;
            color: #bbb;
            text-decoration: none;
            font-size: 14px;
            border-bottom: 1px solid #222;
        }
        .chapter-item:hover { background: #333; color: #fff; }
        .active-chapter {
            background: #2c3e50 !important;
            color: #00d4ff !important;
            border-left: 4px solid #00d4ff;
            font-weight: bold;
        }

        /* Nút và Bảng cài đặt */
        #reader-setting-btn {
            position: fixed;
            top: 100px; /* Hạ thấp để không đè Navbar */
            right: 20px;
            font-size: 22px;
            cursor: pointer;
            z-index: 1000;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 50%;
        }

        #reader-setting-panel {
            position: fixed;
            top: 160px;
            right: 20px;
            width: 220px;
            background: #111;
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            z-index: 999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .hidden { display: none !important; }
    </style>
	
    <h4 class="text-center fw-bold"
    th:text="'Chương ' + ${chuong.soChuong} + ': ' + ${chuong.tieuDe}">
</h4>
    <p class="text-center text-muted small">
        Cập nhật: <span th:text="${#temporals.format(chuong.ngayTao, 'dd/MM/yyyy HH:mm')}"></span>
    </p>
<input type="hidden" id="chuongIdCurrent" th:value="${chuong.id}">
    <div id="reader-content" class="fs-5 lh-lg my-4" th:if="${canRead}" th:utext="${chuong.noiDung}"></div>

    <div id="reader-setting-btn">⚙️</div>

    <div id="reader-setting-panel" class="hidden">
        <h6 class="border-bottom pb-2">⚙️ Cài đặt đọc</h6>
        <label class="small text-muted">Font chữ</label>
        <select id="fontSelect" class="form-select form-select-sm mb-2">
            <option value="serif">Serif</option>
            <option value="sans-serif">Sans-serif</option>
            <option value="'Roboto', sans-serif">Roboto</option>
             <option value="'Merriweather', serif">Merriweather (Sử thi)</option>
    <option value="'EB Garamond', serif">EB Garamond (Sách cổ)</option>
    <option value="'Cormorant Garamond', serif">Cormorant (Quý tộc cổ)</option>
    <option value="'Spectral', serif">Spectral (Cổ phong)</option>
    <option value="'Noto Serif', serif">Noto Serif (Đọc lâu)</option>
        </select>
		
		<label class="small text-muted">Ngôn ngữ</label>

<div class="position-relative mb-2">

<select id="langSelect" class="form-select form-select-sm fw-bold">
    <option value="vi">🇻🇳 Tiếng Việt</option>
    <option value="en">🇬🇧 English</option>
    <option value="ja">🇯🇵 日本語</option>
    <option value="zh">🇨🇳 中文</option>
</select>

<div id="translateSpinner"
     class="spinner-border spinner-border-sm text-primary position-absolute"
     style="right:10px; top:8px; display:none;"
     role="status">
</div>

</div>
		
		
        <label class="small text-muted">Cỡ chữ</label>
        <input type="range" id="fontSize" class="form-range" min="14" max="50">

        <button id="chapter-info-btn" class="btn btn-sm btn-outline-warning w-100 mt-3">ℹ️ Danh sách chương</button>
    </div>

    <div id="chapter-list" class="hidden">
        <div class="p-2 border-bottom border-secondary mb-2">
            <h6 class="text-warning mb-1" th:text="${chuong.truyen.tenTruyen}">Tên Truyện</h6>
            <small class="text-muted">Danh sách chương</small>
        </div>
        <div class="list-group list-group-flush">
            <a th:each="c : ${dsChuong}" 
               th:href="@{/DustNovel/chuong/{id}(id=${c.id})}"
               th:classappend="${c.id == chuong.id} ? 'active-chapter' : ''"
               class="chapter-item">
                <span th:text="'Chương ' + ${c.soChuong} + ': ' + ${c.tieuDe}"></span>
                <i th:if="${!@permissionService.canReadChuong(c, currentUser)}" class="ms-1">🔒</i>
            </a>
        </div>
    </div>

    <div class="chapter-nav">
        <div class="nav-left">
            <a th:if="${chuongTruoc != null}" th:href="@{/DustNovel/chuong/{id}(id=${chuongTruoc.id})}" class="btn btn-outline-secondary">⬅ Trước</a>
        </div>
        <div class="nav-center">
            <a th:href="@{/DustNovel/truyen/{id}(id=${chuong.truyen.id})}" class="btn btn-outline-primary">🏠 Truyện</a>
        </div>
        <div class="nav-right">
            <div th:if="${chuongSau != null}">
                <a th:if="${@permissionService.canReadChuong(chuongSau, currentUser)}" th:href="@{/DustNovel/chuong/{id}(id=${chuongSau.id})}" class="btn btn-outline-secondary">Sau ➡</a>
                <button th:unless="${@permissionService.canReadChuong(chuongSau, currentUser)}" class="btn btn-outline-danger" data-bs-toggle="modal" th:data-bs-target="'#muaChuongModal__' + ${chuongSau.id}">Sau 🔒</button>
            </div>
        </div>
    </div>
    <div th:replace="chuong/comment :: commentSection"></div>

    <div th:if="${chuongSau != null && !@permissionService.canReadChuong(chuongSau, currentUser)}">
        <div class="modal fade" th:id="'muaChuongModal__' + ${chuongSau.id}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered text-dark"> <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title fw-bold">Mua chương tiếp theo</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body text-center">
                        <p>Bạn đang mua: <b th:text="${chuongSau.tieuDe}"></b></p>
                        <h4 class="text-danger fw-bold"><span th:text="${T(com.fpoly.config.GiaChuongKhoa).gia_chuong}"></span> Token</h4>
                        <hr>
                        <div th:if="${currentUser != null}" class="bg-light p-2 rounded">
                            <span>Số dư: </span><b class="text-primary"><span th:text="${currentUser.token}"></span> Token</b>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                        <form th:if="${currentUser != null}" th:action="@{/DustNovel/chuong/{id}/mua(id=${chuongSau.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>	
                            <button type="submit" class="btn btn-danger px-4" th:disabled="${currentUser.token < T(com.fpoly.config.GiaChuongKhoa).gia_chuong}">Xác nhận mua</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function () {
        const settingBtn   = document.getElementById("reader-setting-btn");
        const settingPanel = document.getElementById("reader-setting-panel");
        const fontSelect   = document.getElementById("fontSelect");
        const fontSize     = document.getElementById("fontSize");
        const chapterBtn   = document.getElementById("chapter-info-btn");
        const chapterList  = document.getElementById("chapter-list");
        const content      = document.getElementById("reader-content");

        if (!content) return;

        function applyStyle(property, value) {
            content.style.setProperty(property, value, "important");
        }

        settingBtn.onclick = (e) => {
            e.stopPropagation();
            settingPanel.classList.toggle("hidden");
            chapterList.classList.add("hidden");
        };

        fontSelect.onchange = (e) => {
            applyStyle("font-family", e.target.value);
            localStorage.setItem("dust-font", e.target.value);
        };

        fontSize.oninput = (e) => {
            applyStyle("font-size", e.target.value + "px");
            localStorage.setItem("dust-fontSize", e.target.value);
        };

        chapterBtn.onclick = (e) => {
            e.stopPropagation();
            chapterList.classList.toggle("hidden");
            settingPanel.classList.add("hidden");
            setTimeout(() => {
                const active = document.querySelector(".active-chapter");
                if (active) active.scrollIntoView({ behavior: "smooth", block: "center" });
            }, 100);
        };

        document.addEventListener("click", (e) => {
            if (!settingPanel.contains(e.target) && e.target !== settingBtn) settingPanel.classList.add("hidden");
            if (!chapterList.contains(e.target) && e.target !== chapterBtn) chapterList.classList.add("hidden");
        });

        // Load settings
        const savedFont = localStorage.getItem("dust-font");
        if (savedFont) { fontSelect.value = savedFont; applyStyle("font-family", savedFont); }
        const savedSize = localStorage.getItem("dust-fontSize");
        if (savedSize) { fontSize.value = savedSize; applyStyle("font-size", savedSize + "px"); }
        
     // ==========================================
        // LOGIC LƯU BOOKMARK (BÔI ĐEN + NÚT NỔI)
        // ==========================================
        
        // 1. Tự động tạo nút Bookmark nổi bằng JS (Khỏi cần viết thêm HTML/CSS)
        const floatingBtn = document.createElement("div");
        floatingBtn.innerHTML = "🔖 Lưu vị trí";
        floatingBtn.style.cssText = "display:none; position:absolute; background:#00d4ff; color:#000; padding:8px 15px; border-radius:8px; cursor:pointer; z-index:1050; font-weight:bold; box-shadow:0 4px 10px rgba(0,0,0,0.5); transition: 0.2s;";
        document.body.appendChild(floatingBtn);

        let currentViTri = 0;
        let currentPhanTram = 0;
        let currentText = "";

        // 2. Bắt sự kiện bôi đen chữ
        content.addEventListener("mouseup", function (e) {
            const selection = window.getSelection();
            if (!selection.rangeCount || selection.toString().trim() === "") {
                floatingBtn.style.display = "none";
                return;
            }

            // Lấy vị trí, phần trăm và text
            const range = selection.getRangeAt(0);
            currentViTri = range.startOffset;
            currentText = selection.toString().substring(0, 100);
            currentPhanTram = Math.floor(window.scrollY / document.body.scrollHeight * 100);

            // Bật nút nổi lên ngay chỗ chuột
            floatingBtn.style.display = "block";
            floatingBtn.style.left = e.pageX - 20 + "px";
            floatingBtn.style.top = (e.pageY - 50) + "px";
        });

        // 3. Ẩn nút nếu bấm ra ngoài
        document.addEventListener("mousedown", function(e) {
            if (e.target !== floatingBtn) {
                floatingBtn.style.display = "none";
            }
        });

        // 4. Xử lý khi user bấm nút "Lưu vị trí"
        floatingBtn.addEventListener("click", function(e) {
            e.preventDefault();
            
            // Lấy ID chương từ thẻ hidden ở Bước 1
            const chuongId = document.getElementById("chuongIdCurrent").value;
            
            // "Trộm" luôn CSRF Token từ cái form mua chương của ông có sẵn ở trên
            const csrfTokenNode = document.querySelector('input[name="_csrf"]');
            const csrfToken = csrfTokenNode ? csrfTokenNode.value : '';

            // Đóng gói dữ liệu chuẩn URL-encoded để gửi cho Controller
            const formData = new URLSearchParams();
            formData.append("chuongId", chuongId);
            formData.append("viTri", currentViTri);
            formData.append("phanTram", currentPhanTram);
            formData.append("text", currentText);

            floatingBtn.innerHTML = "⏳ Đang lưu...";

            // Bắn API
            fetch("/DustNovel/bookmark/save", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                    "X-CSRF-TOKEN": csrfToken // Chìa khóa qua cửa Spring Security
                },
                body: formData.toString()
            })
            .then(response => {
                if (!response.ok) throw new Error("Chưa đăng nhập hoặc lỗi hệ thống!");
                return response.text();
            })
            .then(data => {
                alert("✅ Đã lưu vị trí đọc thành công!");
                floatingBtn.style.display = "none";
                floatingBtn.innerHTML = "🔖 Lưu vị trí";
                window.getSelection().removeAllRanges(); // Xóa bôi đen
            })
            .catch(err => {
                alert("❌ Không thể lưu Bookmark: " + err.message);
                floatingBtn.innerHTML = "🔖 Lưu vị trí";
            });
        });
        
     // ==========================================
        // LOGIC 2: TỰ ĐỘNG CUỘN TRANG TỚI VỊ TRÍ BOOKMARK
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const savedOffset = urlParams.get('offset');

        // Nếu trên URL có chữ ?offset=... thì mới chạy tính năng cuộn
        if (savedOffset && content) {
            // Đợi 0.5s để web load xong hết font chữ, ảnh, định dạng rồi mới cuộn cho chuẩn
            setTimeout(() => {
                scrollToOffset(content, parseInt(savedOffset));
            }, 500);
        }

        function scrollToOffset(container, offset) {
            let charCount = 0;
            let targetNode = null;
            let targetNodeOffset = 0;

            // Bộ máy đào xới HTML: Tìm xem ký tự thứ "offset" nó nằm ở cái thẻ <p> nào
            const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
            let node;
            while ((node = walker.nextNode())) {
                let nextCharCount = charCount + node.length;
                if (nextCharCount >= offset) {
                    targetNode = node;
                    targetNodeOffset = offset - charCount;
                    break;
                }
                charCount = nextCharCount;
            }

            // Nếu tìm thấy vị trí
            if (targetNode) {
                try {
                    const range = document.createRange();
                    range.setStart(targetNode, targetNodeOffset);
                    range.collapse(true);
                    
                    // Tạo một điểm neo (span) vô hình ngay tại vị trí chữ đó
                    const marker = document.createElement("span");
                    range.insertNode(marker);
                    
                    // 1. Lệnh xịn nhất: Tự động trượt màn hình mượt mà tới đúng điểm neo đó
                    marker.scrollIntoView({ behavior: "smooth", block: "center" });
                    
                    // 2. Ép thêm tí "hiệu ứng Hollywood": Highlight vàng chớp tắt để User chú ý
                    marker.style.backgroundColor = "rgba(255, 193, 7, 0.6)"; 
                    marker.style.transition = "background-color 2s ease-in-out";
                    
                    // Nửa giây sau từ từ mờ đi cho đỡ chói mắt
                    setTimeout(() => { 
                        marker.style.backgroundColor = "transparent"; 
                    }, 1500);
                    
                } catch(e) { 
                    console.log("Lỗi khi tạo điểm neo cuộn trang:", e); 
                }
            }
        }
        
        const langSelect = document.getElementById('langSelect');
        const readerContent = document.getElementById('reader-content');
        const translateSpinner = document.getElementById('translateSpinner');
        const originalContent = readerContent.innerHTML; // Lưu lại bản gốc tiếng Việt

        langSelect.addEventListener('change', function() {
            const lang = this.value;

            // Nếu chọn về tiếng Việt thì lấy luôn bản gốc, khỏi gọi API
            if(lang === 'vi') {
                readerContent.innerHTML = originalContent;
                return;
            }

            // Bật hiệu ứng xoay tròn chờ dịch
            translateSpinner.classList.remove('d-none');
            readerContent.style.opacity = '0.5';

            const chuongId = document.getElementById("chuongIdCurrent").value;
            const csrfTokenNode = document.querySelector('input[name="_csrf"]');
            const csrfToken = csrfTokenNode ? csrfTokenNode.value : '';

            fetch('/DustNovel/api/dich/chuong', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-TOKEN': csrfToken
                },
                body: JSON.stringify({
                    chuongId: chuongId,
                    lang: lang
                })
            })
            .then(response => response.text())
            .then(data => {
                readerContent.innerHTML = data; // Đắp chữ mới vào
            })
            .catch(err => {
                alert("Lỗi khi gọi bản dịch!");
                console.error(err);
            })
            .finally(() => {
                translateSpinner.classList.add('d-none');
                readerContent.style.opacity = '1';
            });
        });
        
    });
    
    
    
    </script>
</div> </html>
