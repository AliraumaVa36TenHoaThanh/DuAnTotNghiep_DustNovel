<head>
    <meta charset="UTF-8">
    <title th:text="${title}">DustNovel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/DustNovel/css/theme.css}">
</head>

<div th:fragment="content">
    <div class="row">

        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <img th:src="${truyen.anhBia}" class="img-fluid rounded" alt="Ảnh bìa">
            </div>

            <div class="mt-3 d-grid gap-2">

                <a class="btn btn-success"
                   th:href="@{/DustNovel/tap/them/{truyenId}(truyenId=${truyen.id})}"
                   th:if="${@permissionService.canAddChuong(truyen.id)}">
                    ➕ Thêm tập
                </a>

                <a class="btn btn-warning"
                   th:href="@{/DustNovel/truyen/sua/{id}(id=${truyen.id})}"
                   th:if="${@permissionService.canEditTruyen(truyen.id)}">
                    ✏️ Sửa truyện
                </a>

                <form th:action="@{/DustNovel/truyen/{ten}/xoa/{id}(ten=${truyen.tenTruyen}, id=${truyen.id})}"
                      method="post"
                      th:if="${@permissionService.canDeleteTruyen(truyen.id)}"
                      onsubmit="return confirm('Bạn có chắc muốn xoá truyện này không?')">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger w-100">
                        ❌ Xoá truyện
                    </button>
                </form>

            </div>
        </div>

        <div class="col-md-9">

            <h3 class="fw-bold" th:text="${truyen.tenTruyen}"></h3>

            <div class="mb-3">
                <p class="mb-1">
                    <b>Tác giả:</b>
                    <span th:text="${truyen.tenTacGia}"></span>
                </p>

                <p class="mb-1">
                    <b>Người đăng:</b>
                    <span class="text-primary" th:text="${truyen.nguoiDang.tenDangNhap}"></span>
                </p>

                <p class="mb-1">
                    <b>Nội dung:</b>
                    <span th:if="${truyen.tag18}" class="badge bg-danger">18+</span>
                    <span th:unless="${truyen.tag18}" class="badge bg-success">An toàn</span>
                </p>
            </div>
			
			<div class="mb-3">
				<p class="mb-1">
    <b>Trạng thái:</b>
    <span th:text="${truyen.trangThai.label}"></span>
</p>

		<form th:if="${@permissionService.canEditTruyen(truyen.id)}"
      th:action="@{/DustNovel/truyen/{id}/doi-trang-thai(id=${truyen.id})}"
      method="post"
      class="d-inline">

    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <button class="btn btn-sm btn-outline-primary">	
        🔄 Đổi trạng thái
    </button>
</form>
			</div>
			
            <div class="mb-3">
                <div class="mb-3">
    <a class="badge bg-secondary me-1 text-decoration-none"
       th:each="tl : ${truyen.theLoais}"
       th:href="@{/DustNovel/the-loai/{id}(id=${tl.id})}"
       th:text="${tl.tenTheLoai}">
    </a>
</div>
            </div>

            <div class="card bg-light mb-4">
                <div class="card-body">
                    <h6 class="fw-bold">Mô tả</h6>
                    <p class="mb-0" th:text="${truyen.moTa}"></p>
                </div>
            </div>

            <hr>
	
            <h5 class="fw-bold mb-3">
                <i class="bi bi-collection"></i> Danh sách tập
            </h5>
	
            <div th:if="${#lists.isEmpty(dsTap)}" class="text-muted">
                Truyện chưa có tập nào.
            </div>

            <div th:each="tap : ${dsTap}">
                <div th:replace="tap/detail :: tapDetail(${tap}, ${truyen}, ${currentUser})"></div>
            </div>

        </div>
    </div>
    
    <script th:inline="javascript">
        function showAllChapters(tapId) {
            // Tìm tất cả các chương có class ẩn của tập đó
            const chapters = document.querySelectorAll('.extra-chuong-' + tapId);
            
            chapters.forEach(el => {
                el.classList.remove('d-none'); // Bỏ class ẩn của Bootstrap
                el.style.animation = "fadeIn 0.5s forwards";
            });

            // Ẩn nút "Xem thêm"
            const btnMore = document.getElementById('btn-show-more-' + tapId);
            if (btnMore) {
                btnMore.style.display = 'none';
            }
        }
    </script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</div>
