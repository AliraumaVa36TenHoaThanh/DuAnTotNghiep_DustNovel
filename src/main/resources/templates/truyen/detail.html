<head>
    <meta charset="UTF-8">
    <title th:text="${title}">DustNovel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/DustNovel/css/theme.css}">
</head>

<div th:fragment="content">
    <div class="row">

        <!-- CỘT TRÁI -->
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <img th:src="${truyen.anhBia}" class="img-fluid rounded" alt="Ảnh bìa">
            </div>

			<!-- LIKE + VIEW -->
			<div class="text-center mt-3">

				<div class="d-flex justify-content-center gap-4 text-muted mb-2">
					<div>
						👍 <b id="likeCount" th:text="${truyen.tongLike}">0</b>
					</div>
					<div>
						👀 <b th:text="${truyen.luotXem}">0</b>
					</div>
				</div>

				<!-- NÚT LIKE -->
				<button class="btn btn-outline-primary btn-sm w-100"
					th:attr="data-id=${truyen.id}" onclick="likeTruyen(this)">
					👍 Thích truyện</button>

			</div>

			<!-- ACTION -->
			<div class="mt-3 d-grid gap-2">

				<a class="btn btn-success"
					th:href="@{/DustNovel/tap/them/{truyenId}(truyenId=${truyen.id})}"
					th:if="${@permissionService.canAddChuong(truyen.id)}"> ➕ Thêm
					tập </a> <a class="btn btn-warning"
					th:href="@{/DustNovel/truyen/{ten}/{id}/sua(ten=${truyen.tenTruyen}, id=${truyen.id})}"
					th:if="${@permissionService.canEditTruyen(truyen.id)}"> ✏️ Sửa
					truyện </a>

				<form
					th:action="@{/DustNovel/truyen/{ten}/xoa/{id}(ten=${truyen.tenTruyen}, id=${truyen.id})}"
					method="post"
					th:if="${@permissionService.canDeleteTruyen(truyen.id)}"
					onsubmit="return confirm('Bạn có chắc muốn xoá truyện này không?')">

					<input type="hidden" th:name="${_csrf.parameterName}"
						th:value="${_csrf.token}" />
					<button type="submit" class="btn btn-danger w-100">❌ Xoá
						truyện</button>

				</form>

			</div>
		</div>

        <!-- CỘT PHẢI -->
        <div class="col-md-9">

            <h3 class="fw-bold" th:text="${truyen.tenTruyen}"></h3>

            <div class="mb-3">
                <p class="mb-1">
                    <b>Tác giả:</b>
                    <span th:text="${truyen.tenTacGia}"></span>
                </p>

                <p class="mb-1">
                    <b>Người đăng:</b>
                    <span class="text-primary"
                          th:text="${truyen.nguoiDang.tenDangNhap}"></span>
                </p>

                <p class="mb-1">
                    <b>Nội dung:</b>
                    <span th:if="${truyen.tag18}" class="badge bg-danger">18+</span>
                    <span th:unless="${truyen.tag18}" class="badge bg-success">An toàn</span>
                </p>
            </div>

            <!-- THỂ LOẠI -->
            <div class="mb-3">
                <span class="badge bg-secondary me-1"
                      th:each="tl : ${truyen.theLoais}"
                      th:text="${tl.tenTheLoai}">
                </span>
            </div>

            <!-- MÔ TẢ -->
            <div class="card bg-light mb-4">
                <div class="card-body">
                    <h6 class="fw-bold">Mô tả</h6>
                    <p class="mb-0" th:text="${truyen.moTa}"></p>
                </div>
            </div>

            <hr>

            <!-- DANH SÁCH TẬP -->
            <h5 class="fw-bold mb-3">
                <i class="bi bi-collection"></i> Danh sách tập
            </h5>

            <div th:if="${#lists.isEmpty(dsTap)}" class="text-muted">
                Truyện chưa có tập nào.
            </div>

            <div th:each="tap : ${dsTap}">
                <div th:replace="tap/detail :: tapDetail(${tap}, ${truyen}, ${currentUser})"></div>
            </div>

        </div>
    </div>

  <script>
function likeTruyen(btn) {
    const truyenId = btn.dataset.id;

    fetch('/DustNovel/like/' + truyenId, {
        method: 'POST',
        headers: {
            'X-CSRF-TOKEN': document.querySelector('input[name=_csrf]').value
        }
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("likeCount").innerText = data.tongLike;
    })
    .catch(err => console.error(err));
}
</script>



    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</div>
