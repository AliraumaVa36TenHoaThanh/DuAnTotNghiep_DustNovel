<head>
    <meta charset="UTF-8">
    <title th:text="${title}">DustNovel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/DustNovel/css/theme.css}">
<style>
	body {
	    font-family: 'Quicksand', sans-serif !important;
	    letter-spacing: 0.2px;
	}
</style>
</head>

<div th:fragment="content">

    <div class="container mt-4">
        <div class="row g-4">

            <!-- ================= LEFT COLUMN ================= -->
            <div class="col-lg-3">
            <div class="card border-0 shadow-sm">
                <img th:src="${truyen.anhBia}" class="img-fluid rounded" alt="Ảnh bìa">
            </div>
			
			<div class="mt-3 d-grid gap-2">
                
                <div class="d-flex gap-2">
                    <a th:if="${chuongDau != null}" 
                       th:href="@{/DustNovel/chuong/{id}(id=${chuongDau.id})}" 
                       class="btn btn-primary w-100 fw-bold shadow-sm">
                        <i class="bi bi-book"></i> Đọc Chương Đầu
                    </a>
                    
                    <a th:if="${chuongMoi != null}" 
                       th:href="@{/DustNovel/chuong/{id}(id=${chuongMoi.id})}" 
                       class="btn btn-info text-white w-100 fw-bold shadow-sm">
                        <i class="bi bi-fire"></i> Đọc Chương Mới Nhất
                    </a>
                </div>
                <hr th:if="${@permissionService.canAddChuong(truyen.id) or @permissionService.canEditTruyen(truyen.id)}" 
                    class="my-1 text-muted">
                    <div class="text-center mt-3">
                        <button class="btn btn-outline-primary btn-sm w-100"
                                th:attr="data-id=${truyen.id}"
                                onclick="likeTruyen(this)">
                            Tim ❤️
                        </button>
                    </div>
                    <div class="mt-3 d-grid gap-2">

                        <a class="btn btn-success"
                           th:href="@{/DustNovel/tap/them/{truyenId}(truyenId=${truyen.id})}"
                           th:if="${@permissionService.canAddChuong(truyen.id)}">
                            ➕ Thêm tập
                        </a>

						<a class="btn btn-warning shadow-sm" 
							th:href="@{/DustNovel/truyen/sua/{id}(id=${truyen.id})}"
							th:if="${@permissionService.canEditTruyen(truyen.id)}">
							✏️ Sửa truyện
						</a>

						<form th:action="@{/DustNovel/truyen/{ten}/xoa/{id}(ten=${truyen.tenTruyen}, id=${truyen.id})}"
						      method="post"
						      th:if="${@permissionService.canDeleteTruyen(truyen.id)}"
						      onsubmit="return confirm('Bạn có chắc muốn xoá truyện này không?')"
						      class="w-100">

						    <input type="hidden" th:name="${_csrf.parameterName}"
						           th:value="${_csrf.token}" />

						    <button type="submit"
						            class="btn btn-danger w-100 fs-6">
						        ❌ Xoá truyện
						    </button>
						</form>

                    </div>
                </div>
            </div>

            <div class="col-lg-9">

            <h3 class="fw-bold mb-3" th:text="${truyen.tenTruyen}"></h3>

            <div class="mb-3">
                <p class="mb-1">
                    <b>Tác giả:</b>
                    <span th:text="${truyen.tenTacGia}"></span>
                </p>

                <p class="mb-1">
                    <b>Người đăng:</b>
                    <span class="text-primary"
                          th:text="${truyen.nguoiDang.tenDangNhap}"></span>
                </p>

                <p class="mb-1">
                    <b>Nội dung:</b>
                    <span th:if="${truyen.tag18}" class="badge bg-danger">18+</span>
                    <span th:unless="${truyen.tag18}" class="badge bg-success">An toàn</span>
                </p>
            </div>
			
			<div class="mb-3">
				<p class="mb-1">
                    <b>Trạng thái:</b>
                    <span th:text="${truyen.trangThai.label}"></span>
                </p>

                <form th:if="${@permissionService.canEditTruyen(truyen.id)}"
                      th:action="@{/DustNovel/truyen/{id}/doi-trang-thai(id=${truyen.id})}"
                      method="post"
                      class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="btn btn-sm btn-outline-primary">	
                        🔄 Đổi trạng thái
                    </button>
                </form>
			</div>
			
            <div class="mb-3">
                <a class="badge bg-secondary me-1 text-decoration-none"
                   th:each="tl : ${truyen.theLoais}"
                   th:href="@{/DustNovel/the-loai/{id}(id=${tl.id})}"
                   th:text="${tl.tenTheLoai}">
                </a>
            </div>

            <div class="stats-bar d-flex justify-content-around text-center py-3 mb-4 border-top border-bottom">
                
                <div class="stat-item flex-fill border-end">
                    <div class="stat-title text-muted small mb-1">Lần cuối</div>
                    <div class="stat-value fw-bold fs-5" 
                         th:text="${ngayCapNhat != null ? #temporals.format(ngayCapNhat, 'dd/MM/yyyy') : 'Chưa có'}">
                    </div>
                </div>	
                
				<div class="stat-item flex-fill border-end">
					<div class="stat-title text-muted small mb-1">Tim</div>
					<div class="stat-value fw-bold fs-5">
						❤️ <span id="likeCount" th:text="${truyen.tongLike != null ? truyen.tongLike : 0}">0</span>
					</div>
				</div>
				
                <div class="stat-item flex-fill border-end">
                    <div class="stat-title text-muted small mb-1">Số từ</div>
                    <div class="stat-value fw-bold fs-5" 
                         th:text="${tongSoTu != null ? #numbers.formatInteger(tongSoTu, 1, 'POINT') : '0'}">
                    </div>
                </div>

                <div class="stat-item flex-fill">
                    <div class="stat-title text-muted small mb-1">Lượt xem</div>
                    <div class="stat-value fw-bold fs-5" 
                         th:text="${luotXem != null ? #numbers.formatInteger(luotXem, 1, 'POINT') : '0'}">
                    </div>
                </div>

            </div>

            <div class="card bg-light mb-4">
                <div class="card-body">
                    <h6 class="fw-bold">Mô tả</h6>
                    <p class="mb-0" th:text="${truyen.moTa}"></p>
                </div>
            </div>

            <hr>
	
            <h5 class="fw-bold mb-3">
                <i class="bi bi-collection"></i> Danh sách tập
            </h5>
	
            <div th:if="${#lists.isEmpty(dsTap)}" class="text-muted">
                Truyện chưa có tập nào.
            </div>

            <div th:each="tap : ${dsTap}">
                <div th:replace="tap/detail :: tapDetail(${tap}, ${truyen}, ${currentUser})"></div>
            </div>

        </div>
        <hr class="mt-5">

        <h4 class="fw-bold mb-3">💬 Bình luận</h4>

        <div sec:authorize="isAuthenticated()" class="mb-4">
            <form th:action="@{/DustNovel/binh-luan/add}" method="post">
                <input type="hidden" name="truyenId" th:value="${truyen.id}"/>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <textarea name="noiDung"
                          class="form-control mb-2"
                          rows="3"
                          placeholder="Nhập bình luận..."
                          required></textarea>

                <button type="submit" class="btn btn-primary">
                    Gửi bình luận
                </button>
            </form>
        </div>

        <div sec:authorize="!isAuthenticated()" class="alert alert-warning">
            Bạn phải <a th:href="@{/DustNovel/login}">đăng nhập</a> để bình luận.
        </div>

        <div th:if="${#lists.isEmpty(comments)}" class="text-muted">
            Chưa có bình luận nào.
        </div>
        <div th:each="bl : ${comments}"
     th:if="${bl.parent == null}"
     class="card mb-3 shadow-sm">

    <div class="card-body">
       <div class="d-flex justify-content-between align-items-start">
    <div class="d-flex align-items-center gap-2">

        <div class="rounded-circle bg-primary text-white fw-bold
                    d-flex align-items-center justify-content-center shadow"
             style="width:42px;height:42px;">
            <span th:text="${#strings.substring(bl.nguoiDung.tenDangNhap,0,1).toUpperCase()}"></span>
        </div>

        <div>
            <b th:text="${bl.nguoiDung.tenDangNhap}"></b>
            <div>
                <small class="text-muted"
                       th:text="${#temporals.format(bl.ngayBinhLuan,'dd/MM/yyyy HH:mm')}">
                </small>
            </div>
        </div>

    </div>

            <!-- SỬA + XÓA (CHỈ CHỦ COMMENT HOẶC ADMIN) -->
           <div sec:authorize="isAuthenticated()">

    <!-- ===== NÚT SỬA ===== -->
     <a th:if="${bl.nguoiDung.tenDangNhap == #authentication.name 
               or #authorization.expression('hasRole(''ADMIN'')')}"
       href="javascript:void(0)"
       th:onclick="'toggleEdit(' + ${bl.id} + ')'"
       class="text-warning small me-2">
        ✏ Sửa
    </a>

    <!-- ===== NÚT XÓA ===== -->
    <form th:if="${bl.nguoiDung.tenDangNhap == #authentication.name 
                  or #authorization.expression('hasRole(''ADMIN'')') 
                  or truyen.nguoiDang.tenDangNhap == #authentication.name}"
          th:action="@{/DustNovel/binh-luan/delete}"
          method="post"
          class="d-inline"
          onsubmit="return confirm('Bạn có chắc muốn xoá bình luận này?')">

        <input type="hidden" name="commentId" th:value="${bl.id}"/>
        <input type="hidden" name="truyenId" th:value="${truyen.id}"/>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <button type="submit"
                class="btn btn-link text-danger p-0 small">
            🗑 Xóa
        </button>
    </form>

</div>
        </div>

        <!-- NỘI DUNG -->
        <p class="mt-2 mb-2" th:text="${bl.noiDung}"></p>

        <!-- NÚT REPLY -->
        <div sec:authorize="isAuthenticated()">
            <a href="javascript:void(0)"
               th:onclick="'toggleReply(' + ${bl.id} + ')'"
               class="text-primary small">
                ↩ Trả lời
            </a>
        </div>

        <!-- FORM REPLY -->
        <div th:id="'reply-form-' + ${bl.id}"
             class="d-none mt-2 ms-4">

            <form th:action="@{/DustNovel/binh-luan/reply}" method="post">
                <input type="hidden" name="truyenId" th:value="${truyen.id}"/>
                <input type="hidden" name="parentId" th:value="${bl.id}"/>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <textarea name="noiDung"
                          class="form-control mb-2"
                          rows="2"
                          placeholder="Nhập trả lời..."
                          required></textarea>

                <button type="submit"
                        class="btn btn-sm btn-secondary">
                    Gửi
                </button>
            </form>
        </div>

        <!-- FORM SỬA COMMENT -->
        <!-- FORM UPDATE COMMENT -->
<div th:id="'edit-form-' + ${bl.id}"
     class="d-none mt-2"
     sec:authorize="isAuthenticated()"
     th:if="${bl.nguoiDung.tenDangNhap == #authentication.name 
             or #authorization.expression('hasRole(''ADMIN'')')}">

    <form th:action="@{/DustNovel/binh-luan/update}" method="post">

        <input type="hidden" name="commentId" th:value="${bl.id}"/>
        <input type="hidden" name="truyenId" th:value="${truyen.id}"/>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <textarea name="noiDung"
                  class="form-control mb-2"
                  rows="2"
                  th:text="${bl.noiDung}"
                  required></textarea>

        <button type="submit"
                class="btn btn-sm btn-success">
            Cập nhật
        </button>
    </form>
</div>
        <!-- ================= REPLIES ================= -->
        <div th:each="reply : ${bl.replies}"
             class="mt-3 ms-4 border-start ps-3">

            <div class="d-flex justify-content-between">
                <div>
                    <b th:text="${reply.nguoiDung.tenDangNhap}"></b>
                    <small class="text-muted ms-2"
                           th:text="${#temporals.format(reply.ngayBinhLuan,'dd/MM/yyyy HH:mm')}">
                    </small>
                </div>

                <!-- SỬA + XÓA REPLY (CHỈ CHỦ HOẶC ADMIN) -->
              <div sec:authorize="isAuthenticated()"
     th:if="${reply.nguoiDung.tenDangNhap == #authentication.name
             or truyen.nguoiDang.tenDangNhap == #authentication.name
             or #authorization.expression('hasRole(''ADMIN'')')}">
                             
                              
                             

                    <form th:action="@{/DustNovel/binh-luan/delete}"
                          method="post"
                          class="d-inline"	
                          onsubmit="return confirm('Bạn có chắc muốn xoá trả lời này?')">

                        <input type="hidden" name="commentId" th:value="${reply.id}"/>
                        <input type="hidden" name="truyenId" th:value="${truyen.id}"/>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
	
                        <button type="submit"
                                class="btn btn-link text-danger p-0 small">
                            🗑 Xóa
                        </button>
                    </form>
                </div>
            </div>

            <p class="mt-2 mb-1" th:text="${reply.noiDung}"></p>
            
            <div th:id="'edit-reply-form-' + ${reply.id}"
         class="d-none mt-2"
         sec:authorize="isAuthenticated()"
         th:if="${reply.nguoiDung.tenDangNhap == #authentication.name 
                 or #authorization.expression('hasRole(''ADMIN'')')}">

        <form th:action="@{/DustNovel/binh-luan/update}"
              method="post">

            <input type="hidden" name="commentId" th:value="${reply.id}"/>
            <input type="hidden" name="truyenId" th:value="${truyen.id}"/>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <textarea name="noiDung"
                      class="form-control mb-2"
                      rows="2"
                      th:text="${reply.noiDung}"
                      required></textarea>

            <button type="submit"
                    class="btn btn-sm btn-success">
                Cập nhật
            </button>
        </form>
    </div>
            
        </div>

    </div>
</div>

<script>
    function likeTruyen(btn) {
        const truyenId = btn.dataset.id;

        fetch('/DustNovel/like/' + truyenId, {
            method: 'POST',
            headers: {
                'X-CSRF-TOKEN': document.querySelector('input[name=_csrf]').value
            }
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById("likeCount").innerText = data.tongLike;
        })
        .catch(err => console.error(err));
    }

    function toggleReply(id) {
        document.getElementById("reply-form-" + id)
                .classList.toggle("d-none");
    }

    function toggleEdit(id) {
        document.getElementById("edit-form-" + id)
                .classList.toggle("d-none");
    }
    function toggleEditReply(id) {
        document.getElementById("edit-reply-form-" + id)
                .classList.toggle("d-none");
    }
</script>
