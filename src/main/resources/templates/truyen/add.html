<div th:fragment="content">

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
 
<style>
/* ===== FILTER BOX ===== */
.filter-box {
    position: relative;
    width: 100%;              /* cho cha giãn theo form */
    max-width: 600px;         /* không quá rộng */
}
/* ===== HEADER ===== */
.filter-header {
    border: 1px solid #d1d5db;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
    width: 122px;   
    min-height: 36px;      /* thấp hơn */
    padding: 4px 10px;     /* giảm padding */
    font-size: 14px;  
}

.filter-header span {
    color: #9ca3af;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
/* ===== DROPDOWN ===== */
.filter-list {
    display: none;       /* mặc định ẩn */
    position: absolute;
    top: 45px;
    left: 0;

    width: 600px;        /* sửa lại cho hợp form */
    max-height: 260px;

    background: #fff;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 15px;
    z-index: 999;

    overflow-y: auto;

    /* QUAN TRỌNG */
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;

    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
}
/* ===== ITEM ===== */
.filter-item {
    padding: 8px 10px;
    font-size: 13px;
    border-radius: 8px;
    background: #f3f4f6;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;

    white-space: nowrap;      /* không xuống dòng */
    overflow: hidden;
    text-overflow: ellipsis;  /* quá dài thì ... */
}

.filter-item.active {
    background: #4f6ef7;
    color: #fff;
}

/* ===== SCROLLBAR ===== */
.filter-list::-webkit-scrollbar {
    width: 6px;
}

.filter-list::-webkit-scrollbar-track {
    background: transparent;
}

.filter-list::-webkit-scrollbar-thumb {
    background: #999;
    border-radius: 10px;
}

.filter-list::-webkit-scrollbar-button {
    display: none;
}
/* Firefox */
.filter-list {
    scrollbar-width: thin;
    scrollbar-color: #999 transparent;
}
</style>


<div class="card">
    <div class="card-header">
        <h4>Thêm truyện</h4>
    </div>

    <div class="card-body">
        <form th:action="@{/DustNovel/themtruyen}" th:object="${truyen}" method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label>Tên truyện</label>
                <input type="text" th:field="*{tenTruyen}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Mô tả</label>
                <textarea th:field="*{moTa}" class="form-control"></textarea>
            </div>

            <div class="mb-3">
                <label>Tên tác giả</label>
                <input type="text" th:field="*{tenTacGia}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Loại truyện</label>
                <select th:field="*{loaiTruyen}" class="form-select">
                    <option value="SÁNG_TÁC">Sáng tác</option>
                    <option value="DỊCH">Dịch</option>
                </select>
            </div>
			
<!--			
			<div class="mb-3">
    <label class="form-label">Thể loại</label>
    
    <div th:if="${error}" class="alert alert-danger">
    <span th:text="${error}"></span>
</div>

    <div class="d-flex flex-wrap gap-2">
        <label th:each="tl : ${dsTheLoai}"  class="badge bg-light text-dark border">
            <input type="checkbox"
                   name="theLoaiIds"
                   th:value="${tl.id}">
            <span th:text="${tl.tenTheLoai}"></span>
        </label>
    </div>
</div>
-->         

                  <div class="mb-3">
					<label class="form-label">Thể loại</label>

					<div th:if="${error}" class="alert alert-danger">
						<span th:text="${error}"></span>
					</div>

					<div class="filter-box">
						<div class="filter-header" onclick="toggleFilter()">
							<span id="filterText">Thể loại</span> <i
								class="fa-solid fa-chevron-down"></i>
						</div>

						<div class="filter-list" id="filterList">

							<!-- Tất cả -->
							<div class="filter-item active" onclick="locTatCa(this)">
								Tất cả</div>

							<!-- Danh sách thể loại -->
							<div th:each="tl : ${dsTheLoai}" class="filter-item"
								th:attr="data-id=${tl.id}" onclick="chonTheLoai(this)">

								<input type="checkbox" name="theLoaiIds" th:value="${tl.id}"
									hidden> <span th:text="${tl.tenTheLoai}"></span>
							</div>
						</div>
					</div>
				</div>
			
			
			
            <div class="mb-3">
                <label>Trạng thái</label>
                <select th:field="*{trangThai}" class="form-select">
                    <option value="ĐANG_RA">Đang ra</option>
                    <option value="HOÀN_THÀNH">Hoàn thành</option>
                </select>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" th:field="*{tag18}">
                <label class="form-check-label">Truyện 18+</label>
            </div>

            
            <div class="mb-3">
    <label class="form-label">Ảnh bìa (URL)</label>
    
    <input type="file"
       name="file"
       class="form-control mt-2"
       accept="image/*"
       onchange="previewFile(event)">

    <input type="text"
           th:field="*{anhBia}"
           class="form-control"
           placeholder="Dán link ảnh bìa (tỉ lệ 3:4)"
           oninput="previewAnhBia(this.value)">

    <div class="mt-3">
        <div class="border rounded overflow-hidden shadow-sm"
             style="width:180px; aspect-ratio:3/4; background:#f8f9fa;">
            <img id="previewAnhBia"
                 th:src="*{anhBia} ?: @{/images/default.jpg}"
                 style="width:100%; height:100%; object-fit:cover;"
                 alt="Ảnh bìa">
        </div>
    </div>
</div>
            
            

            <button class="btn btn-primary">Lưu truyện</button>
        </form>
    </div>
</div>
<script>
    function previewAnhBia(url) {
        const img = document.getElementById('previewAnhBia');
        if (url && url.startsWith('http')) {
            img.src = url;
        } else {
            img.src = '/images/default.jpg';
        }
    }
    
    function previewFile(event) {

        const file = event.target.files[0];
        const img  = document.getElementById('previewAnhBia');

        if (file) {

            const reader = new FileReader();

            reader.onload = function (e) {
                img.src = e.target.result;
            };

            reader.readAsDataURL(file);
        }
    }
    
        
    
    document.addEventListener("DOMContentLoaded", function () {
    const filterList = document.getElementById("filterList");
    const filterText = document.getElementById("filterText");
    const tatCaBtn   = document.querySelector("#filterList .filter-item:first-child");

    // ẨN FILTER KHI LOAD
    filterList.style.display = "none";

    // RESET TẤT CẢ KHI LOAD
    document.querySelectorAll("input[name='theLoaiIds']").forEach(cb => {
        cb.checked = false;
    });

    document.querySelectorAll("#filterList .filter-item").forEach(item => {
        item.classList.remove("active");
    });

    filterText.innerText = "Thể loại";
    filterText.style.color = "#9ca3af";

});


function toggleFilter() {
    const list = document.getElementById("filterList");
    list.style.display =
        (list.style.display === "grid") ? "none" : "grid";
}


function chonTheLoai(element) {

    const checkbox = element.querySelector("input[type='checkbox']");
    checkbox.checked = !checkbox.checked;

    element.classList.toggle("active");

    updateFilterText();
}


function locTatCa(element) {

    const allItems = document.querySelectorAll("#filterList .filter-item");
    const allCheckboxes = document.querySelectorAll("input[name='theLoaiIds']");

    const isActive = element.classList.contains("active");

    if (isActive) {
        // BỎ HẾT
        allItems.forEach(item => item.classList.remove("active"));
        allCheckboxes.forEach(cb => cb.checked = false);
    } else {
        // CHỌN HẾT
        allItems.forEach(item => item.classList.add("active"));
        allCheckboxes.forEach(cb => cb.checked = true);
    }

    element.classList.toggle("active");

    updateFilterText();
}


function updateFilterText() {

    const checked = document.querySelectorAll(
        "input[name='theLoaiIds']:checked"
    );

    const total = document.querySelectorAll(
        "input[name='theLoaiIds']"
    ).length;

    const text = document.getElementById("filterText");
    const tatCaBtn = document.querySelector("#filterList .filter-item:first-child");

    if (checked.length === 0) {
        text.innerText = "Thể loại";
        text.style.color = "#9ca3af";
        tatCaBtn.classList.remove("active");
        return;
    }

    if (checked.length === total) {
        text.innerText = "Tất cả";
        text.style.color = "#111";
        tatCaBtn.classList.add("active");
        return;
    }

    text.innerText = checked.length + " thể loại";
    text.style.color = "#111";
    tatCaBtn.classList.remove("active");
}
    
</script>
</div>
