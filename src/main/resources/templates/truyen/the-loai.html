<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">

    <h4 class="mb-4">
        📚 Thể loại:
        <span th:text="${theLoai.tenTheLoai}"></span>
    </h4>
    
    <div th:if="${warningMessage}"
         class="text-danger fw-bold mb-4" 
         style="font-size: 18px;
          font-family: 'Segoe UI', Arial, sans-serif;">
        <span th:text="${warningMessage}"></span>
    </div>

    <!-- ✅ THÔNG BÁO KHI KHÔNG CÓ TRUYỆN -->
    <div th:if="${#lists.isEmpty(truyens)}"
         class="alert alert-warning text-center">
        📭 Hiện chưa có truyện nào thuộc thể loại
        <strong th:text="${theLoai.tenTheLoai}"></strong>
    </div>

    <!-- ✅ DANH SÁCH TRUYỆN -->
    <div class="row" th:if="${!#lists.isEmpty(truyens)}">
        <div class="col-md-3 mb-3" th:each="truyen : ${truyens}">
            <div class="card h-100">

                <img th:src="${truyen.tag18} 
                    ? 'https://i.pinimg.com/1200x/69/05/e3/6905e37f8ca8a420fd303393921ecec0.jpg'
                    : (${truyen.anhBia != null && !#strings.isEmpty(truyen.anhBia)}
                        ? ${truyen.anhBia}
                        : @{/images/default.jpg})"
                     style="width:100%; aspect-ratio:9/11; object-fit:cover;"
                     class="rounded shadow">
					 <div class="card-body d-flex flex-column">

					     <h6 class="card-title"
					         th:text="${truyen.tenTruyen}">
					     </h6>

					     <small class="text-muted mb-1"
					            th:text="'Tác giả: ' + ${truyen.tenTacGia}">
					     </small>
					 	<div class="mb-2 d-flex flex-wrap gap-1">
					 	    <a th:each="tl : ${truyen.theLoais}"
					 	       th:href="@{/DustNovel/the-loai/{id}(id=${tl.id})}"
					 	       th:text="${tl.tenTheLoai}"
					 	       class="badge bg-secondary text-decoration-none">
					 	    </a>
					 	</div>
					     <small class="text-danger mb-2"
					            th:if="${truyen.tag18}">
					         🔞 Nội dung 18+
					     </small>

					     <a th:href="@{/DustNovel/truyen/{id}(id=${truyen.id})}"
					        class="btn btn-sm btn-outline-primary mt-auto">
					         Xem truyện
					     </a>

					 </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
