<div th:fragment="tapDetail(tap, truyen, currentUser)">
   <div class="card mb-4 shadow-sm border-0">

    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
        <h6 class="mb-0 fw-bold" th:text="${tap.tenTap}"></h6>
        <div class="d-flex align-items-center gap-2"
             th:if="${@permissionService.canAddChuongByTap(tap.id)}">

            <a class="btn btn-sm btn-outline-light fw-bold"
               th:href="@{/DustNovel/chuong/them/{truyenId}/{tapId}
               (truyenId=${truyen.id}, tapId=${tap.id})}">
                <i class="bi bi-plus-lg"></i> Thêm chương
            </a>

            <a class="btn btn-sm btn-warning fw-bold"
               th:href="@{/DustNovel/tap/sua/{id}(id=${tap.id})}">
                ✏️ Sửa
            </a>

            <form th:action="@{/DustNovel/tap/xoa/{id}(id=${tap.id})}"
                  method="post"
                  class="m-0"
                  onsubmit="return confirm('Xoá tập này?')">

                <button type="submit" class="btn btn-sm btn-danger fw-bold">
                    🗑️ Xoá
                </button>
            </form>

        </div>
    </div>

</div>
        <ul class="list-group list-group-flush" th:id="'list-chuong-' + ${tap.id}">
            <th:block th:with="dsChuong=${@chuongService.findByTap(tap.id)}">
                
                <li class="list-group-item d-flex justify-content-between align-items-center py-3" 
                    th:each="chap, iterStat : ${dsChuong}"
                    th:classappend="${iterStat.index >= 5} ? 'd-none extra-chuong-' + ${tap.id} : ''">
                    
                    <div class="d-flex align-items-center">
                        <div th:if="${@permissionService.canReadChuong(chap, currentUser)}">
                            <a th:href="@{/DustNovel/chuong/{id}(id=${chap.id})}"
   class="fw-bold text-dark text-decoration-none d-inline-flex align-items-center">

   <span th:text="'Chương ' + ${chap.soChuong} + ': ' + ${chap.tieuDe}"></span>

    <span th:if="${chap.newChuong}"
      class="badge bg-danger ms-2"
      style="font-size: 0.7rem;">
    NEW!
</span>

</a>



                        </div>
                        <div th:unless="${@permissionService.canReadChuong(chap, currentUser)}">
                            <span class="text-muted" th:text="${chap.tieuDe}"></span>
                            <span th:if="${currentUser != null}" class="badge bg-danger ms-2" style="cursor: pointer"
                                  data-bs-toggle="modal" th:data-bs-target="'#muaChuongModal__' + ${chap.id}">
                                🔒 Mua (<span th:text="${chap.giaToken}"></span>)
                            </span>
                        </div>
                        
                    </div>
					
                    <div th:if="${@permissionService.canEditChuong(chap.id)}"
     class="ms-auto d-flex align-items-center gap-1">

    <a th:href="@{/DustNovel/chuong/sua/{id}(id=${chap.id})}"
       class="btn btn-sm btn-warning"
       title="Sửa chương">
        ✏️
    </a>

    <form th:action="@{/DustNovel/chuong/xoa/{id}(id=${chap.id})}"
          method="post"
          class="m-0">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit"
                class="btn btn-sm btn-danger"
                title="Xoá chương"
                onclick="return confirm('Xoá chương này?')">
            🗑️
        </button>
    </form>
                        <form th:action="@{/DustNovel/chuong/{id}/toggle-khoa(id=${chap.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" th:class="${chap.khoa ? 'btn btn-sm btn-success' : 'btn btn-sm btn-outline-secondary'}">
                                <span th:text="${chap.khoa ? '🔓 Mở khóa' : '🔒 Khóa'}"></span>
                            </button>
                        </form>
                        
                    </div>

                    <div th:if="${chap.khoa}" th:replace="~{chuong/mua-modal :: muaModal(${chap}, ${currentUser})}"></div>
                </li>
<li class="list-group-item text-center py-2 bg-light border-top-0" 
    th:if="${#lists.size(dsChuong) > 5}" 
    th:id="'btn-show-more-' + ${tap.id}">
    <button type="button" class="btn btn-link text-decoration-none fw-bold w-100" 
            th:onclick="'showAllChapters(' + ${tap.id} + ')'">
        <i class="bi bi-chevron-double-down"></i> Xem thêm các chương khác...
    </button>
</li>

                <li class="list-group-item text-center text-muted py-4" th:if="${#lists.isEmpty(dsChuong)}">
                    Chưa có chương nào.
                </li>
            </th:block>
        </ul>
    </div>
</div>
