<div th:fragment="content">

    <h4 class="fw-bold mb-4">
        ✏️ Sửa tập
    </h4>

  <form th:action="@{/DustNovel/tap/sua}" method="post">

    <input type="hidden" name="tapId" th:value="${tap.id}"/>

    <div class="mb-3">
        <label class="form-label fw-bold">Tên tập</label>
        <input type="text"
               name="tenTap"
               class="form-control"
               th:value="${tap.tenTap}"
               required>
    </div>

    <button type="submit" class="btn btn-primary">
        💾 Lưu thay đổi
    </button>

</form>

</div>
