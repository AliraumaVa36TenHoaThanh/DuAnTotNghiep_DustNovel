<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Sửa thể loại truyện</title>

<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

<style>
* {
	box-sizing: border-box;
	font-family: "Segoe UI", Arial, sans-serif;
}

body {
	margin: 0;
	background: #f4f6f9;
	color: #111;
}

.sidebar {
	width: 260px;
	height: 100vh;
	position: fixed;
	top: 0;
	left: 0;
	background: #ffffff;
	border-right: 1px solid #e0e0e0;
	padding: 20px;
}

.main-content {
	margin-left: 260px;
	padding: 30px;
}

.card {
	background: #ffffff;
	border-radius: 16px;
	box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
	padding: 32px;
	max-width: 1190px;
	margin-left: 30px;
}

.page-title {
	font-size: 22px;
	font-weight: 600;
	margin-bottom: 25px;
}

.form-group {
	margin-bottom: 24px;
}

label {
	font-weight: 600;
	margin-bottom: 8px;
	display: block;
}

.form-control {
	width: 100%;
	padding: 14px 16px;
	border-radius: 8px;
	border: 1px solid #ccc;
	font-size: 15px;
}

.form-control:focus {
	outline: none;
	border-color: #0d6efd;
}

.form-control.error {
	border-color: #e74c3c;
}

.error-message {
	color: #e74c3c;
	font-size: 13px;
	margin-top: 6px;
}

.form-actions {
	display: flex;
	justify-content: flex-end;
	gap: 20px;
	margin-top: 30px;
}

.btn {
	height: 46px;
	padding: 12px 22px;
	border-radius: 10px;
	border: none;
	cursor: pointer;
	display: flex;
	align-items: center;
	gap: 8px;
	color: #fff;
	text-decoration: none;
}

.btn-back {
	background: #6c757d;
}

.btn-back:hover {
	background: #5a6268;
}

.btn-save {
	background: #198754;
}

.btn-save:hover {
	background: #157347;
}
</style>
</head>

<body>

	<div class="sidebar">
		<h3>Menu</h3>
	</div>

	<div class="main-content">
		<div class="card">

			<div class="page-title">Sửa thể loại truyện</div>

			<form
				th:action="@{/dba/truyen-the-loai/sua}"
				method="post">

				<input type="hidden" name="id"  th:value="${theLoai.id}" >
				<input type="hidden" id="tenCu" th:value="${theLoai.tenTheLoai}">

				<div class="form-group">
					<label for="tenTheLoai">Tên thể loại</label>

					<input
						type="text"
						id="tenTheLoai"
						name="tenTheLoai"
						class="form-control"
						th:value="${theLoai.tenTheLoai}"
						placeholder="Nhập tên thể loại">
						
				    <small id="errorClient" class="error-message" style="display:none;"></small>
				    

					<small
                      class="error-message"
                      th:if="${errorTenTheLoai != null}"
                      th:text="${errorTenTheLoai}">
                   </small>
				</div>

				<div class="form-actions">
					<a th:href="@{/dba/truyen-the-loai}" class="btn btn-back">
						<i class="fa-solid fa-arrow-left"></i>
						<span>Quay lại</span>
					</a>

					<button type="submit" class="btn btn-save" >
						<i class="fa-solid fa-pen-to-square"></i>
						<span>Cập nhật</span>
					</button>
				</div>
			</form>
		</div>
	</div>	
</body>
<script>
document.querySelector("form").addEventListener("submit", function () {

    let tenMoi = document.getElementById("tenTheLoai").value.trim();
    let tenCu = document.getElementById("tenCu").value.trim();

    if (tenMoi !== tenCu && tenMoi !== "") {
        sessionStorage.setItem("daCapNhat", "true");
    } else {
        sessionStorage.removeItem("daCapNhat");
    }

});


window.addEventListener("load", function () {
	
    let errorServer = document.querySelector(".error-message");

    if (errorServer) {
        sessionStorage.removeItem("daCapNhat");
        return;
    }

    if (sessionStorage.getItem("daCapNhat") === "true") {
        alert("Cập nhật thành công");
        sessionStorage.removeItem("daCapNhat");
    }
});
</script>

</html>
