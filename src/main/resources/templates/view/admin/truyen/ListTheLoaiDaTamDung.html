<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<meta charset="UTF-8">

<style>
.card-custom {
    border-radius: 18px;
    background: #fff;
    border: 1px solid #e5e7eb;
}

.header-flex {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header-title h5 {
    font-weight: 600;
    margin-bottom: 15px;
    margin-top: 20px; 
    margin-left: 10px;
}

.header-title p {
    color: #6c757d;
    margin: 15;
    margin-left: 10px;
}



.badge-status {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
}

.badge-dadung {
    background: #f8d7da;
    color: #842029;
}

.row-limit-box {
	margin-top: 30px;
	margin-left:10px;
}



.btn-danger,
.btn-success,
.btn-secondary {
    border-radius: 8px;
}

.filter-box {
    position: relative;
    width: 260px;
}

.filter-header {
    border: 1px solid #d1d5db;
    border-radius: 5px;
    padding: 4px 12px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
    margin-right:100px
}

.filter-header span {
    color: #9ca3af; 
    font-size: 14px;
    white-space: nowrap;
    text-overflow: ellipsis;
}

.filter-list {
    display: none;
    position: absolute;
    top: 45px;
    min-width: 450px;
    max-width: 320px;
    max-height: 250px;
    background: #fff;
    border: 2px solid #000;
    border-radius: 12px;
    padding: 15px;
    z-index: 999;
    overflow-y: auto;
    overflow-x: hidden;
    display: none;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}

.filter-item {
    padding: 6px 8px;
    font-size: 13px;
    border-radius: 8px;
    background: #f3f4f6;
    text-align: center;
    cursor: pointer;

    white-space: nowrap;       
    transition: 0.2s;
}

.filter-item:hover {
    background: #4f6ef7;
    color: #fff;
}

.filter-item.active {
    background: #4f6ef7;
    color: #fff;
}

.filter-list::-webkit-scrollbar {
    width: 6px;
}

.filter-list::-webkit-scrollbar-track {
    background: transparent;
}

.filter-list::-webkit-scrollbar-thumb {
    background: #c5c5c5;
    border-radius: 10px;
}

.filter-list::-webkit-scrollbar-thumb:hover {
    background: #999;
}
</style>

<link
   href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
   rel="stylesheet">

<link
   rel="stylesheet"
   href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
   
<div th:fragment="content" class="container-fluid px-4">
    <div id="main">
        <section class="section">
            <div class="card card-custom">

                <!-- Header -->
                <div class="card-header bg-white border-0 pb-0">
                    <div class="header-flex">

                        <div class="header-title">
                            <h5>Danh sách thể loại đã tạm dừng</h5>
                            <p>Các thể loại hiện không hoạt động</p>
                            
                            <div class="d-flex align-items-center gap-2 row-limit-box">
									<label class="mb-0">Hiển thị :</label> <select id="rowLimit"
										class="form-select form-select-sm" style="width: 80px;">
										<option value="5">5</option>
										<option value="10" selected>10</option>
										<option value="15">15</option>
										<option value="20">20</option>
										<option value="25">25</option>
									</select>
									
									<div class="filter-box">
										<div class="filter-header" onclick="toggleFilter()">
											<span id="filterText">thể loại</span> <i
												class="fa-solid fa-chevron-down"></i>
										</div>

										<div class="filter-list" id="filterList">
											<div class="filter-item active" onclick="locTatCa(this)">
												Tất cả</div>

											<div th:each="tl : ${listTheLoaiDaDung}" class="filter-item"
												th:text="${tl.tenTheLoai}"
												th:attr="data-ten=${tl.tenTheLoai}"
												onclick="chonTheLoai(this)"></div>
										</div>
									</div>
								</div>
                        </div>

                        <div class="d-flex gap-2">

                            <input type="text"
                                   id="searchInput"
                                   class="form-control"
                                   placeholder="Tìm tên thể loại..."
                                   style="width:250px;">

                            <a href="/dba/truyen-the-loai"
                               class="btn btn-secondary">
                                <i class="fa fa-arrow-left me-1"></i>
                                Quay lại
                            </a>

                        </div>
                    </div>
                </div>

                <!-- Body -->
                <div class="card-body">
                    <table class="table table-hover align-middle mt-3" id="theLoaiTable">

                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Tên thể loại</th>
                                <th>Trạng thái</th>
                                <th class="text-center">Thao tác</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:each="tl : ${listTheLoaiDaDung}">
                                <td th:text="${tl.id}"></td>
                                <td th:text="${tl.tenTheLoai}"></td>

                                <!-- Cột trạng thái -->
                                <td>
                                  <span th:class="${tl.statusTheLoai.name() == 'ON'} ? 
                                                'badge-status badge-hoatdong' : 
                                                'badge-status badge-dadung'">
                                  <span th:text="${tl.statusTheLoai.name() == 'ON'} ? 
                                                'Đang hoạt động' : 
                                                'Đã tạm dừng'">
                                  </span>
                                  </span>
                                </td>
                                
                                <td class="text-center">
                                    <a class="btn btn-sm btn-success me-1"
                                       th:href="@{/dba/truyen-the-loai/khoi-phuc/{id}(id=${tl.id})}"
                                       onclick="if(confirm('Bạn có chắc muốn kích hoạt lại thể loại này không?')){
                                    	   alert('Kích hoạt thành công!'); return true;} return false;">
                                        <i class="fa fa-rotate-left me-1"></i>
                                        
                                    </a>                                  
                                    <a class="btn btn-sm btn-danger"
                                       th:href="@{/dba/truyen-the-loai/xoa-han/{id}(id=${tl.id})}"
                                       onclick="if(confirm('Bạn có chắc muốn xóa vĩnh viễn thể loại này không?')){
                                    	   alert('Xóa thành công!'); return true;} return false;">
                                       <i class="fa fa-trash me-1"></i>
                                        
                                    </a>                                                                                                   
                                </td>
                            </tr>

                            <tr th:if="${#lists.isEmpty(listTheLoaiDaDung)}">
                                <td colspan="4" class="text-center text-muted">
                                    Không có thể loại nào đã dừng
                                </td>
                            </tr>
                        </tbody>

                    </table>
                    <div class="d-flex justify-content-center mt-3">
                       <ul class="pagination" id="pagination"></ul>
                   </div>
                </div>

            </div>
        </section>
    </div>
</div>

<script>

/* =====================================================
   1️⃣ SEARCH THE LOẠI  (ĐÃ SỬA: thêm khóa control)
===================================================== */

let isSearching = false;
let isFiltering = false;

document.getElementById("searchInput").addEventListener("keyup", function () {

    let filter = this.value.toLowerCase();
    let rows = document.querySelectorAll("#theLoaiTable tbody tr");

    const pagination = document.getElementById("pagination");
    const rowLimitSelect = document.getElementById("rowLimit");
    const filterHeader = document.querySelector(".filter-header");

    if (filter !== "") {
        isSearching = true;

        // 🔒 KHÓA
        pagination.style.pointerEvents = "none";
        pagination.style.opacity = "0.5";
        rowLimitSelect.disabled = true;
        filterHeader.style.pointerEvents = "none";
        filterHeader.style.opacity = "0.5";
    } else {
        isSearching = false;

        // 🔓 MỞ LẠI
        pagination.style.pointerEvents = "auto";
        pagination.style.opacity = "1";
        rowLimitSelect.disabled = false;
        filterHeader.style.pointerEvents = "auto";
        filterHeader.style.opacity = "1";

        displayTable(1);
        return;
    }

    rows.forEach(row => {
        let ten = row.cells[1].textContent.toLowerCase();
        row.style.display = ten.includes(filter) ? "" : "none";
    });

});


/* =====================================================
   2️⃣ ROW LIMIT (CODE CŨ GIỮ NGUYÊN)
===================================================== */

document.addEventListener("DOMContentLoaded", function () {

    const rowLimitSelect = document.getElementById("rowLimit");
    const table = document.getElementById("theLoaiTable");
    const tbody = table.querySelector("tbody");

    function updateRowLimit() {
        const limit = parseInt(rowLimitSelect.value);
        const rows = tbody.querySelectorAll("tr");

        rows.forEach((row, index) => {
            if (index < limit) {
                row.style.display = "";
            } else {
                row.style.display = "none";
            }
        });
    }

    updateRowLimit();
    rowLimitSelect.addEventListener("change", updateRowLimit);

});


/* =====================================================
   3️⃣ PAGINATION (CODE CŨ GIỮ NGUYÊN)
===================================================== */

let currentPage = 1;

document.addEventListener("DOMContentLoaded", function () {

    const table = document.getElementById("theLoaiTable");
    const tbody = table.querySelector("tbody");
    const rows = tbody.querySelectorAll("tr");
    const pagination = document.getElementById("pagination");
    const rowLimitSelect = document.getElementById("rowLimit");

    function displayTable(page) {
        const limit = parseInt(rowLimitSelect.value);
        const start = (page - 1) * limit;
        const end = start + limit;

        rows.forEach((row, index) => {
            row.style.display = (index >= start && index < end) ? "" : "none";
        });

        currentPage = page;
        setupPagination();
    }

    window.displayTable = displayTable;

    function setupPagination() {
        pagination.innerHTML = "";
        const limit = parseInt(rowLimitSelect.value);
        const pageCount = Math.ceil(rows.length / limit);

        const prev = document.createElement("li");
        prev.className = "page-item";
        prev.innerHTML = `<a class="page-link" href="#">‹</a>`;
        prev.onclick = () => {
            if (currentPage > 1) displayTable(currentPage - 1);
        };
        pagination.appendChild(prev);

        for (let i = 1; i <= pageCount; i++) {
            const li = document.createElement("li");
            li.className = "page-item " + (i === currentPage ? "active" : "");
            li.innerHTML = `<a class="page-link" href="#">${i}</a>`;
            li.onclick = () => displayTable(i);
            pagination.appendChild(li);
        }

        const next = document.createElement("li");
        next.className = "page-item";
        next.innerHTML = `<a class="page-link" href="#">›</a>`;
        next.onclick = () => {
            if (currentPage < pageCount) displayTable(currentPage + 1);
        };
        pagination.appendChild(next);
    }

    rowLimitSelect.addEventListener("change", function () {
        if (!isSearching && !isFiltering) {
            currentPage = 1;
            displayTable(1);
        }
    });

    displayTable(1);
});


/* =====================================================
   4️⃣ FILTER BOX  (ĐÃ THÊM)
   👉 Chỉ hiển thị thể loại ĐÃ TẠM DỪNG
===================================================== */

function toggleFilter() {
    const list = document.getElementById("filterList");
    list.style.display =
        (list.style.display === "grid") ? "none" : "grid";
}


function chonTheLoai(element) {

    const selectedTen = element.getAttribute("data-ten"); // 👈 lấy tên thể loại
    const rows = document.querySelectorAll("#theLoaiTable tbody tr");
    const pagination = document.getElementById("pagination");
    const rowLimitSelect = document.getElementById("rowLimit");
    const searchInput = document.getElementById("searchInput");

    isFiltering = true;

    // 🔒 KHÓA search + pagination + rowlimit
    pagination.style.pointerEvents = "none";
    pagination.style.opacity = "0.5";
    rowLimitSelect.disabled = true;
    searchInput.disabled = true;

    // reset active
    document.querySelectorAll(".filter-item")
        .forEach(item => item.classList.remove("active"));

    element.classList.add("active");

    // đổi text header
    document.getElementById("filterText").innerText = selectedTen;
    document.getElementById("filterText").style.color = "#111";

    // ⭐ LỌC THEO TÊN THỂ LOẠI
    rows.forEach(row => {
        let tenTheLoai = row.cells[1].textContent.trim();
        row.style.display = (tenTheLoai === selectedTen) ? "" : "none";
    });

    document.getElementById("filterList").style.display = "none";
}



/* =====================================================
   5️⃣ CHỌN TẤT CẢ (ĐÃ THÊM)
===================================================== */

function locTatCa(element) {

    const pagination = document.getElementById("pagination");
    const rowLimitSelect = document.getElementById("rowLimit");
    const searchInput = document.getElementById("searchInput");

    isFiltering = false;
    isSearching = false;

    // 🔓 MỞ LẠI
    pagination.style.pointerEvents = "auto";
    pagination.style.opacity = "1";
    rowLimitSelect.disabled = false;
    searchInput.disabled = false;

    document.querySelectorAll(".filter-item")
        .forEach(item => item.classList.remove("active"));

    element.classList.add("active");

    document.getElementById("filterText").innerText = "Thể loại";
    document.getElementById("filterText").style.color = "#9ca3af";

    searchInput.value = "";

    displayTable(1);

    document.getElementById("filterList").style.display = "none";
}

</script>
