<div xmlns:th="http://www.thymeleaf.org"
     th:fragment="content">

<style>
    .form-card {
        border-radius: 16px;
        overflow: hidden;
        background-color: #ffffff;
    }

    .form-header {
        background: linear-gradient(135deg,#4f6ef7 0%,#2a41a8 100%);
        padding: 25px 20px;
    }

    .input-group-text {
        background-color: #f8f9fa;
        border-right: none;
        color: #6c757d;
    }

    .form-control {
        border-left: none;
        padding-left: 0;
    }

    .form-control:focus {
        box-shadow: none;
        border-color: #dee2e6;
    }

    .input-group:focus-within .input-group-text,
    .input-group:focus-within .form-control {
        border-color: #4f6ef7;
        box-shadow: 0 0 0 0.25rem rgba(79,110,247,0.15);
    }

    .input-group:focus-within .input-group-text {
        color: #4f6ef7;
    }
</style>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <div class="card shadow-lg border-0 form-card">

                <!-- Header -->
                <div class="form-header text-white text-center">
                    <h4 class="mb-2 fw-bold">
                        <i class="fa-solid fa-gift me-2"></i>
                        <span th:text="${title}">Thêm Mã Thưởng</span>
                    </h4>

                    <p class="mb-0 text-white-50" style="font-size:0.95rem">
                        Điền thông tin bên dưới để thiết lập giftcode
                    </p>
                </div>

                <!-- Body -->
                <div class="card-body p-4 p-md-5">

                    <!-- Error -->
                    <div th:if="${errorMsg}"
                         class="alert alert-danger d-flex align-items-center rounded-3 shadow-sm mb-4">

                        <i class="fa-solid fa-triangle-exclamation me-3 fs-4"></i>

                        <div th:text="${errorMsg}"></div>
                    </div>

                    <!-- Form -->
                    <form th:action="@{${maThuong.id == null ? '/admin/ma-thuong/them' : '/admin/ma-thuong/sua/' + maThuong.id}}"
                          th:object="${maThuong}"
                          method="post">

                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}" />

                        <!-- Code -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">
                                Mã Code (Giftcode)
                                <span class="text-danger">*</span>
                            </label>

                            <div class="input-group input-group-lg shadow-sm rounded-3">
                                <span class="input-group-text rounded-start-3">
                                    <i class="fa-solid fa-ticket-simple"></i>
                                </span>

                                <input type="text"
                                       class="form-control text-uppercase rounded-end-3"
                                       th:field="*{code}"
                                       placeholder="VD: TANTHU2026, VIPPRO..."
                                       required>
                            </div>

                            <div class="form-text mt-2">
                                <i class="fa-solid fa-circle-info me-1 text-primary"></i>
                                Mã code nên viết hoa và không dấu.
                            </div>
                        </div>

                        <!-- Phiếu -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">
                                Số phiếu thưởng
                                <span class="text-danger">*</span>
                            </label>

                            <div class="input-group input-group-lg shadow-sm rounded-3">
                                <span class="input-group-text rounded-start-3">
                                    <i class="fa-solid fa-star text-warning"></i>
                                </span>

                                <input type="number"
                                       class="form-control rounded-end-3"
                                       th:field="*{soPhieuThuong}"
                                       min="1"
                                       placeholder="Nhập số lượng phiếu"
                                       required>
                            </div>
                        </div>

                        <!-- Giới hạn -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">
                                Giới hạn số lần nhập
                            </label>

                            <div class="input-group input-group-lg shadow-sm rounded-3">
                                <span class="input-group-text rounded-start-3">
                                    <i class="fa-solid fa-users"></i>
                                </span>

                                <input type="number"
                                       class="form-control rounded-end-3"
                                       th:field="*{soLuongNhap}"
                                       min="1"
                                       placeholder="999999">
                            </div>

                            <div class="form-text mt-2 text-muted">
                                Bỏ trống nếu không giới hạn lượt nhập.
                            </div>
                        </div>

                        <!-- Ngày hết hạn -->
                        <div class="mb-5">
                            <label class="form-label fw-bold">
                                Ngày hết hạn
                            </label>

                            <div class="input-group input-group-lg shadow-sm rounded-3">
                                <span class="input-group-text rounded-start-3">
                                    <i class="fa-regular fa-calendar-xmark"></i>
                                </span>

                                <input type="datetime-local"
                                       class="form-control rounded-end-3"
                                       th:field="*{ngayHetHan}">
                            </div>

                            <div class="form-text mt-2 text-muted">
                                Bỏ trống nếu mã này vô thời hạn.
                            </div>
                        </div>

                        <!-- Button -->
                        <div class="d-flex gap-3 mt-2">

                            <a th:href="@{/admin/ma-thuong}"
                               class="btn btn-light btn-lg flex-fill fw-bold text-secondary shadow-sm border">

                                <i class="fa-solid fa-arrow-left me-1"></i>
                                Trở về
                            </a>

                            <button type="submit"
                                    class="btn btn-primary btn-lg flex-fill fw-bold shadow-sm"
                                    style="background:#4f6ef7;border-color:#4f6ef7">

                                <i class="fa-solid fa-floppy-disk me-1"></i>
                                Lưu Mã
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>
</div>

</div>
