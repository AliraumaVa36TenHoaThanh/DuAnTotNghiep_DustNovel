<div xmlns:th="http://www.thymeleaf.org"
     th:fragment="content">

<style>
    /* ===== BUTTON STYLE ===== */
    .action-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        transition: all 0.25s ease;
    }

    .btn-edit-custom {
        background-color: #f4b400;
        color: white;
        border: none;
    }

    .btn-edit-custom:hover {
        background-color: #e09e00;
        transform: translateY(-2px);
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .btn-lock-custom {
        background-color: #6c757d;
        color: white;
        border: none;
    }

    .btn-lock-custom:hover {
        background-color: #5a6268;
        transform: translateY(-2px);
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .table td {
        vertical-align: middle;
    }

    .badge {
        padding: 6px 10px;
        font-size: 12px;
        border-radius: 6px;
    }
</style>

<div id="main">

    <div class="page-heading">

        <div class="page-title mb-4">
            <h3>Danh sách Mã Thưởng</h3>
            <p class="text-muted">
                Quản lý các mã giftcode trong hệ thống
            </p>
        </div>

        <section class="section">
            <div class="card">

                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Bảng Mã Thưởng</h5>

                    <a th:href="@{/admin/ma-thuong/them}"
                       class="btn btn-success btn-sm action-btn">
                        <i class="fa-solid fa-plus"></i>
                        Tạo mã mới
                    </a>
                </div>

                <div class="card-body">

                    <div th:if="${successMsg}"
                         class="alert alert-success"
                         th:text="${successMsg}"></div>

                    <div th:if="${errorMsg}"
                         class="alert alert-danger"
                         th:text="${errorMsg}"></div>

                    <table class="table table-hover align-middle text-center">
                        <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Mã Code</th>
                            <th>Phiếu thưởng</th>
                            <th>Đã nhập</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="ma, stat : ${dsMaThuong}">
                            <td th:text="${stat.count}"></td>

                            <td class="fw-bold text-primary"
                                th:text="${ma.code}"></td>

                            <td class="text-success fw-bold"
                                th:text="${ma.soPhieuThuong}"></td>

                            <td th:text="${ma.daNhap}"></td>

                            <td>
                                <span th:class="${ma.statusMaThuong.name() == 'ON'} 
                                   ? 'badge bg-success'
                                   : 'badge bg-danger'"
                                      th:text="${ma.statusMaThuong.name() == 'ON'} 
                                   ? 'HOẠT ĐỘNG'
                                   : 'ĐÃ KHÓA'">
                                </span>
                            </td>

                            <td class="d-flex justify-content-center gap-2">

                                <!-- Nút sửa -->
                                <a class="action-btn btn-edit-custom"
                                   th:href="@{/dba/ma-thuong/sua/{id}(id=${ma.id})}">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                    Sửa
                                </a>

                                <!-- Nút khóa -->
                                <form th:action="@{/dba/ma-thuong/doi-trang-thai/{id}(id=${ma.id})}"
                                      method="post"
                                      class="d-inline">

                                    <input type="hidden"
                                           th:name="${_csrf.parameterName}"
                                           th:value="${_csrf.token}" />

                                    <button type="submit"
                                            class="action-btn btn-lock-custom">
                                        <i class="fa-solid fa-lock"></i>
                                        Khóa
                                    </button>

                                </form>

                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(dsMaThuong)}">
                            <td colspan="6"
                                class="text-muted">
                                Chưa có mã thưởng
                            </td>
                        </tr>

                        </tbody>
                    </table>

                </div>
            </div>
        </section>

    </div>

</div>
</div>
