<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Danh sách truyện theo thể loại</title>

<link
   href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
   rel="stylesheet">

<link
   rel="stylesheet"
   href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
* {
	box-sizing: border-box;
	font-family: "Segoe UI", Arial, sans-serif;
}

body {
	margin: 0;
	background: #f4f6f9;
	color: #111;
}

.sidebar {
	width: 260px;
	height: 100vh;
	position: fixed;
	top: 0;
	left: 0;
	background: #ffffff;
	border-right: 1px solid #e0e0e0;
	padding: 20px;
}

.main-content {
	margin-left: 260px;
	padding: 30px;
}

.card {
	background: #ffffff;
	border-radius: 12px;
	box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
	padding: 20px;
	margin-left: 40px;
}

.page-title {
	font-size: 22px;
	font-weight: 600;
	margin-bottom: 15px;
}

.toolbar {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 15px;
	margin-top: -20px
}

.search-box input {
	padding: 8px 12px;
	border-radius: 6px;
	border: 1px solid #ccc;
	width: 260px;
}
.search-box {
    display: flex;
    align-items: center;
    gap: 10px; 
}

.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: #198754; 
    color: #fff;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.2s ease;
}

table {
	width: 100%;
	border-collapse: collapse;
	background: #ffffff;
	margin-top: 35px;
}

thead {
	background: #f1f3f5;
}

th, td {
	padding: 14px;
	border-bottom: 1px solid #e0e0e0;
}

th {
	text-align: left;
}

.action-btn {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	width: 34px;
	height: 34px;
	border-radius: 8px;
	color: #fff;
	text-decoration: none;
	font-size: 16px;
	background: #198754;
}

.text-center {
	text-align: center;
}

.empty {
	text-align: center;
	color: #777;
	font-style: italic;
}

.filter-box {
    position: relative;
    width: 260px;
}

.filter-header {
    border: 1px solid #d1d5db;
    border-radius: 5px;
    padding: 4px 12px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
    margin-right:100px; 
}


.filter-header span {
    color: #9ca3af; 
    font-size: 14px;
    white-space: nowrap;
    text-overflow: ellipsis;
}

.filter-list {
    display: none;
    position: absolute;
    top: 45px;
    min-width: 495px;
    max-width: 320px;
    max-height: 250px;
    background: #fff;
    border: 2px solid #000;
    border-radius: 12px;
    padding: 15px;
    z-index: 999;
    overflow-y: auto;
    overflow-x: hidden;
    display: none;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}

.filter-item {
    padding: 6px 8px;
    font-size: 13px;
    border-radius: 8px;
    background: #f3f4f6;
    text-align: center;
    cursor: pointer;

    white-space: nowrap;       
    transition: 0.2s;
}

.filter-item:hover {
    background: #4f6ef7;
    color: #fff;
}

.filter-item.active {
    background: #4f6ef7;
    color: #fff;
}

.btn {
    white-space: nowrap;   
}

.row-limit-box {
    position: relative;
    top: 10px;  
}

.row-limit-box label {
    white-space: nowrap; 
}

.filter-list::-webkit-scrollbar {
    width: 6px;
}

.filter-list::-webkit-scrollbar-track {
    background: transparent;
}

.filter-list::-webkit-scrollbar-thumb {
    background: #c5c5c5;
    border-radius: 10px;
}

.filter-list::-webkit-scrollbar-thumb:hover {
    background: #999;
}

#searchInput:disabled {
    background-color: #e9ecef;
    opacity: 1;
}
</style>
</head>

<body>

	<div class="sidebar">
		<h3>Menu</h3>
	</div>

	<div class="main-content">
		<div class="card">

			<div class="page-title">
				Truyện thuộc thể loại:
				<span th:text="${theLoai.tenTheLoai}">Tên thể loại</span>
			</div>

			<div class="toolbar">
				<span>Danh sách truyện</span>
				<div class="search-box">
				 <a href="/dbu/truyen-the-loai" class="back-btn">
						← Quay lại
					</a>
					<input type="text" id="searchInput" placeholder="Tìm tên truyện...">
				</div>
			</div> 
			
			<div class="d-flex align-items-center gap-2 row-limit-box">
				<label class="mb-0">Hiển thị :</label> <select id="rowLimit"
					class="form-select form-select-sm" style="width: 80px;">
					<option value="5">5</option>
					<option value="10" selected>10</option>
					<option value="15">15</option>
					<option value="20">20</option>
					<option value="25">25</option>
				</select>

				<div class="filter-box">
					<div class="filter-header" onclick="toggleFilter()">
						<span id="filterText">thể loại</span> <i
							class="fa-solid fa-chevron-down"></i>
					</div>

					<div class="filter-list" id="filterList">
						<div class="filter-item active" onclick="locTatCa(this)">
							Tất cả</div>

						<div th:each="truyen : ${listTruyenXemUser}" class="filter-item"
							th:text="${truyen.tenTruyen}" th:attr="data-ten=${truyen.tenTruyen}"
							onclick="chonTheLoai(this)"></div>
					</div>
				</div>
			</div>

			<table>
				<thead>
					<tr>
						<th>Tên truyện</th>
						<th>Người đăng</th>
						<th>Thể loại</th>
						<th>Ngày tạo</th>
						<th class="text-center">Xem</th>
					</tr>
				</thead>

				<tbody id="storyTable">
					<tr th:each="truyen : ${listTruyenXemUser}">
						<td th:text="${truyen.tenTruyen}"></td>
						
						<td th:text="${truyen.nguoiDang.tenDangNhap}"></td>

						<td th:text="${theLoai.tenTheLoai}"></td>


						<td th:text="${#temporals.format(truyen.ngayTao,'dd/MM/yyyy')}"></td>

						<td class="text-center">
                         <a class="btn btn-sm btn-success"
                            th:href="@{/DustNovel/truyen/{id}(id=${truyen.id})}"
                            title="Xem truyện">
                         <i class="fa-solid fa-eye"></i>
                        </a>
                      </td>

					</tr>

					<tr th:if="${#lists.isEmpty(listTruyenXemUser)}">
						<td colspan="5" class="empty">
							Chưa có truyện nào thuộc thể loại này
						</td>
					</tr>
				</tbody>
			</table>
            <div class="d-flex justify-content-center mt-3">
             <ul class="pagination" id="pagination"></ul>
          </div>
		</div>
	</div>

<script>

/* =========================================================
   BIẾN TRẠNG THÁI
========================================================= */

let isSearching = false;
let isFiltering = false;
let currentPage = 1;


/* =========================================================
   SEARCH THEO TÊN TRUYỆN
========================================================= */

document.addEventListener("DOMContentLoaded", function () {

    const searchInput = document.getElementById("searchInput");
    const table = document.getElementById("storyTable");
    const rows = table.querySelectorAll("tr");
    const pagination = document.getElementById("pagination");
    const rowLimitSelect = document.getElementById("rowLimit");
    const filterHeader = document.querySelector(".filter-header");

    searchInput.addEventListener("keyup", function () {

        const keyword = this.value.toLowerCase();

        if (keyword !== "") {
            isSearching = true;

            pagination.style.pointerEvents = "none";
            pagination.style.opacity = "0.5";
            rowLimitSelect.disabled = true;
            filterHeader.style.pointerEvents = "none";
            filterHeader.style.opacity = "0.5";

        } else {
            isSearching = false;

            pagination.style.pointerEvents = "auto";
            pagination.style.opacity = "1";
            rowLimitSelect.disabled = false;
            filterHeader.style.pointerEvents = "auto";
            filterHeader.style.opacity = "1";

            displayTable(1);
            return;
        }

        rows.forEach(row => {
            const cell = row.cells[0];
            if (!cell) return;

            row.style.display = cell.textContent.toLowerCase().includes(keyword)
                ? ""
                : "none";
        });

    });



/* =========================================================
   PHÂN TRANG + ROW LIMIT
========================================================= */

    function displayTable(page) {

        const limit = parseInt(rowLimitSelect.value);
        const start = (page - 1) * limit;
        const end = start + limit;

        rows.forEach((row, index) => {
            row.style.display =
                (index >= start && index < end) ? "" : "none";
        });

        currentPage = page;
        setupPagination();
    }

    window.displayTable = displayTable;

    function setupPagination() {

        pagination.innerHTML = "";

        const limit = parseInt(rowLimitSelect.value);
        const pageCount = Math.ceil(rows.length / limit);

        const prev = document.createElement("li");
        prev.className = "page-item";
        prev.innerHTML = `<a class="page-link" href="#">‹</a>`;
        prev.onclick = () => {
            if (currentPage > 1) displayTable(currentPage - 1);
        };
        pagination.appendChild(prev);

        for (let i = 1; i <= pageCount; i++) {
            const li = document.createElement("li");
            li.className = "page-item " + (i === currentPage ? "active" : "");
            li.innerHTML = `<a class="page-link" href="#">${i}</a>`;
            li.onclick = () => displayTable(i);
            pagination.appendChild(li);
        }

        const next = document.createElement("li");
        next.className = "page-item";
        next.innerHTML = `<a class="page-link" href="#">›</a>`;
        next.onclick = () => {
            if (currentPage < pageCount) displayTable(currentPage + 1);
        };
        pagination.appendChild(next);
    }

    rowLimitSelect.addEventListener("change", function () {
        if (!isSearching && !isFiltering) {
            currentPage = 1;
            displayTable(1);
        }
    });

    displayTable(1);

});



/* =========================================================
   TOGGLE FILTER
========================================================= */

function toggleFilter() {
    const list = document.getElementById("filterList");
    list.style.display =
        (list.style.display === "grid") ? "none" : "grid";
}



/* =========================================================
   CHỌN 1 TRUYỆN
========================================================= */

function chonTheLoai(element) {

    const selected = element.getAttribute("data-ten");
    const rows = document.querySelectorAll("#storyTable tr");
    const pagination = document.getElementById("pagination");
    const rowLimitSelect = document.getElementById("rowLimit");
    const searchInput = document.getElementById("searchInput");

    isFiltering = true;

    pagination.style.pointerEvents = "none";
    pagination.style.opacity = "0.5";
    rowLimitSelect.disabled = true;
    searchInput.disabled = true;

    document.querySelectorAll(".filter-item")
        .forEach(item => item.classList.remove("active"));

    element.classList.add("active");

    document.getElementById("filterText").innerText = selected;
    document.getElementById("filterText").style.color = "#111";

    rows.forEach(row => {
        const ten = row.cells[0].innerText;
        row.style.display = (ten === selected) ? "" : "none";
    });

    document.getElementById("filterList").style.display = "none";
}



/* =========================================================
   TẤT CẢ
========================================================= */

function locTatCa(element) {

    const pagination = document.getElementById("pagination");
    const rowLimitSelect = document.getElementById("rowLimit");
    const searchInput = document.getElementById("searchInput");

    isFiltering = false;
    isSearching = false;

    pagination.style.pointerEvents = "auto";
    pagination.style.opacity = "1";
    rowLimitSelect.disabled = false;
    searchInput.disabled = false;

    document.querySelectorAll(".filter-item")
        .forEach(item => item.classList.remove("active"));

    element.classList.add("active");

    document.getElementById("filterText").innerText = "thể loại";
    document.getElementById("filterText").style.color = "#9ca3af";

    searchInput.value = "";

    displayTable(1);

    document.getElementById("filterList").style.display = "none";
}

</script>


</body>
</html>
