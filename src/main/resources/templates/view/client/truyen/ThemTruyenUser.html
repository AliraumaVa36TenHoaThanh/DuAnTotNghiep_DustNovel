<div th:fragment="content">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
.filter-box {
    position: relative;
    max-width: 600px;
}

.filter-header {
    border: 1px solid #d1d5db;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
    width: 200px;
    min-height: 38px;
    padding: 6px 12px;
    font-size: 14px;
}

.filter-list {
    display: none;
    position: absolute;
    top: 45px;
    left: 0;
    width: 600px;
    max-height: 260px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 15px;
    z-index: 999;
    overflow-y: auto;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
}

.filter-list.show {
    display: grid;
}

.filter-item {
    padding: 8px 10px;
    font-size: 13px;
    border-radius: 8px;
    background: #f3f4f6;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
}

.filter-item.active {
    background: #4f6ef7;
    color: #fff;
}
</style>

<div style="background:#f2f2f2; padding:40px 40px 40px 10px;">
<div class="card" style="margin-left: 330px;">
<div class="card-body" style="padding-left: 30px;">

    <div class="card-header">
        <h4>Thêm truyện</h4>
    </div>  
        <form th:action="@{/dbu/truyen/them}" th:object="${truyenUser}" method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label>Tên truyện</label>
                <input type="text" th:field="*{tenTruyen}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Mô tả</label>
                <textarea th:field="*{moTa}" class="form-control"></textarea>
            </div>

            <div class="mb-3">
                <label>Tên tác giả</label>
                <input type="text" th:field="*{tenTacGia}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Loại truyện</label>
                <select th:field="*{loaiTruyen}" class="form-select">
                    <option value="SÁNG_TÁC">Sáng tác</option>
                    <option value="DỊCH">Dịch</option>
                </select>
            </div>
			
			<!--
			<div class="mb-3">
    <label class="form-label">Thể loại</label>
    
    <div th:if="${error}" class="alert alert-danger">
    <span th:text="${error}"></span>
</div>

    <div class="d-flex flex-wrap gap-2">
        <label th:each="tl : ${dsTheLoai}"  class="badge bg-light text-dark border">
            <input type="checkbox"
                   name="theLoaiIds"
                   th:value="${tl.id}">
            <span th:text="${tl.tenTheLoai}"></span>
        </label>
    </div>
</div>
		-->


					<div class="mb-3">
						<label class="form-label">Thể loại</label>

						<div th:if="${error}" class="alert alert-danger">
							<span th:text="${error}"></span>
						</div>

						<div class="filter-box">
							<div class="filter-header" onclick="toggleFilter()">
								<span id="filterText">Thể loại</span> <i
									class="fa-solid fa-chevron-down"></i>
							</div>

							<div class="filter-list" id="filterList">

								<!-- Tất cả -->
								<div class="filter-item" onclick="locTatCa(this)">
									Tất cả</div>

								<!-- Danh sách thể loại -->
								<div th:each="tl : ${dsTheLoai}" class="filter-item"
									th:attr="data-id=${tl.id}" onclick="chonTheLoai(this)">

									<input type="checkbox" name="theLoaiIds" th:value="${tl.id}"
										hidden> <span th:text="${tl.tenTheLoai}"></span>
								</div>

							</div>
						</div>
					</div>


					<div class="mb-3">
                <label>Trạng thái</label>
                <select th:field="*{trangThai}" class="form-select">
                    <option value="ĐANG_RA">Đang ra</option>
                    <option value="HOÀN_THÀNH">Hoàn thành</option>
                </select>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" th:field="*{tag18}">
                <label class="form-check-label">Truyện 18+</label>
            </div>

            
            <div class="mb-3">
    <label class="form-label">Ảnh bìa (URL)</label>
    
    <input type="file"
       name="file"
       class="form-control mt-2"
       accept="image/*"
       onchange="previewFile(event)">

    <input type="text"
           th:field="*{anhBia}"
           class="form-control"
           placeholder="Dán link ảnh bìa (tỉ lệ 3:4)"
           oninput="previewAnhBia(this.value)">

    <div class="mt-3">
        <div class="border rounded overflow-hidden shadow-sm"
             style="width:180px; aspect-ratio:3/4; background:#f8f9fa;">
            <img id="previewAnhBia"
                 th:src="*{anhBia} ?: @{/images/default.jpg}"
                 style="width:100%; height:100%; object-fit:cover;"
                 alt="Ảnh bìa">
        </div>
    </div>
</div>
            
            

            <button class="btn btn-primary">Lưu truyện</button>

					<a th:href="@{/dbu/truyen-sang-tac}"
						style="text-decoration: none; color: #198754; margin-left: 35px; margin-right: 30px;">
						<i class="fa-solid fa-arrow-left"></i> Quay về truyện sáng tác
					</a> <a th:href="@{/dbu/truyen-dich}"
						style="text-decoration: none; color: #198754;"> <i
						class="fa-solid fa-arrow-left"></i> Quay về truyện dịch
					</a>
				</form>
    </div>
</div>
</div>
</div>

<script>
    function previewAnhBia(url) {
        const img = document.getElementById('previewAnhBia');
        if (url && url.startsWith('http')) {
            img.src = url;
        } else {
            img.src = '/images/default.jpg';
        }
    }
    
    //  PREVIEW KHI CHỌN FILE
    function previewFile(event) {
        const file = event.target.files[0];
        const img = document.getElementById('previewAnhBia');

        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    }
    
    
    
    
    document.addEventListener("DOMContentLoaded", function () {
        updateFilterText();
    });

    function toggleFilter() {
        const list = document.getElementById("filterList");
        const arrow = document.getElementById("arrowIcon");

        list.classList.toggle("show");
        arrow.classList.toggle("fa-chevron-up");
        arrow.classList.toggle("fa-chevron-down");
    }

    function chonTheLoai(element) {
        const checkbox = element.querySelector("input");
        checkbox.checked = !checkbox.checked;

        element.classList.toggle("active");

        updateFilterText();
    }

    function locTatCa(element) {

        const allItems = document.querySelectorAll(
            "#filterList .filter-item:not(:first-child)"
        );

        const allCheckboxes = document.querySelectorAll(
            "input[name='theLoaiIds']"
        );

        const isActive = element.classList.contains("active");

        if (isActive) {
            allItems.forEach(i => i.classList.remove("active"));
            allCheckboxes.forEach(cb => cb.checked = false);
            element.classList.remove("active");
        } else {
            allItems.forEach(i => i.classList.add("active"));
            allCheckboxes.forEach(cb => cb.checked = true);
            element.classList.add("active");
        }

        updateFilterText();
    }

    function updateFilterText() {

        const checked = document.querySelectorAll(
            "input[name='theLoaiIds']:checked"
        );

        const total = document.querySelectorAll(
            "input[name='theLoaiIds']"
        ).length;

        const text = document.getElementById("filterText");

        if (checked.length === 0) {
            text.innerText = "Thể loại";
            return;
        }

        if (checked.length === total) {
            text.innerText = "Tất cả";
            return;
        }

        text.innerText = checked.length + " thể loại";
    }

    document.addEventListener("click", function (e) {
        const box = document.querySelector(".filter-box");
        const list = document.getElementById("filterList");

        if (!box.contains(e.target)) {
            list.classList.remove("show");
        }
    });
</script>
