	<div th:fragment="content">

    <div id="mainBanner" class="carousel slide mb-4" data-bs-ride="carousel">
        <div class="carousel-inner rounded shadow">
            <div class="carousel-item active">
                <img src="/images/banner1.jpg" class="d-block w-100" style="height: 320px; object-fit: cover;" alt="Banner 1">
            </div>
            <div class="carousel-item">
                <img src="/images/banner2.jpg" class="d-block w-100" style="height: 320px; object-fit: cover;" alt="Banner 2">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#mainBanner" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#mainBanner" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>
    <h4 class="mb-3 fw-bold">🔥 Truyện sáng tác</h4>
    <div class="row">
        <div class="col-md-3 mb-4" 
             th:each="truyen, iterStat : ${truyenSangTac}" 
             th:if="${iterStat.index < 7}" 
             th:with="chuongMoi=${@chuongService.layChuongMoiNhat(truyen.id)}">
            <div class="card h-100 shadow-sm border-0 bg-light">

                <img th:src="${truyen.tag18} ? 'https://i.pinimg.com/1200x/69/05/e3/6905e37f8ca8a420fd303393921ecec0.jpg' : (${truyen.anhBia != null && !#strings.isEmpty(truyen.anhBia)} ? ${truyen.anhBia} : @{/images/aria.jpg})"
                     class="card-img-top rounded-top" style="aspect-ratio:9/11; object-fit:cover;">

                <div class="card-body d-flex flex-column">
                    <h6 class="card-title fw-bold text-truncate" th:text="${truyen.tenTruyen}" th:title="${truyen.tenTruyen}"></h6>

                    <div th:if="${chuongMoi != null}" class="mb-2 text-truncate" style="font-size: 0.85rem;">
                        <span class="badge bg-danger me-1">New!</span>
                        <a th:href="@{/DustNovel/chuong/{id}(id=${chuongMoi.id})}" class="text-decoration-none text-primary fw-bold"
                           th:text="'Chương ' + ${chuongMoi.soChuong} + ': ' + ${chuongMoi.tieuDe}" th:title="'Chương ' + ${chuongMoi.soChuong} + ': ' + ${chuongMoi.tieuDe}"></a>
                    </div>
                    <div th:unless="${chuongMoi != null}" class="mb-2 text-muted" style="font-size: 0.85rem;"><i>Chưa có chương</i></div>

                    <small class="text-muted mb-2" th:text="'Tác giả: ' + ${truyen.tenTacGia}"></small>
                    
                    <div class="mb-2 d-flex flex-wrap gap-1">
                        <a th:each="tl : ${truyen.theLoais}" th:href="@{/DustNovel/the-loai/{id}(id=${tl.id})}" th:text="${tl.tenTheLoai}" class="badge bg-secondary text-decoration-none"></a>
                    </div>
                    
                    <small class="text-danger mb-2 fw-bold" th:if="${truyen.tag18}">🔞 Nội dung 18+</small>
                    <a th:href="@{/DustNovel/truyen/{id}(id=${truyen.id})}" class="btn btn-sm btn-outline-primary mt-auto fw-bold">Xem truyện</a>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-4" th:if="${#lists.size(truyenSangTac) > 7}">
           <a th:href="@{/DustNovel/truyen/sang-tac}" class="text-decoration-none">
                <div class="card h-100 shadow-sm border-primary bg-light" style="transition: transform 0.2s; min-height: 380px;">
                    <div class="card-body d-flex flex-column align-items-center justify-content-center text-center">
                        <i class="bi bi-arrow-right-circle text-primary" style="font-size: 4rem;"></i>
                        <h5 class="fw-bold mt-3 text-primary">Xem tất cả</h5>
                        <span class="text-muted small fw-bold" th:text="'Khám phá ' + (${#lists.size(truyenSangTac)} - 7) + ' truyện khác...'"></span>
                    </div>
                </div>
            </a>
        </div>
    </div>


    <hr class="my-4">
    <h4 class="mb-3 fw-bold">🌍 Truyện dịch</h4>
    <div class="row">
        <div class="col-md-3 mb-4" 
             th:each="truyen, iterStat : ${truyenDich}" 
             th:if="${iterStat.index < 7}" 
             th:with="chuongMoi=${@chuongService.layChuongMoiNhat(truyen.id)}">
            <div class="card h-100 shadow-sm border-0 bg-light">

                <img th:src="${truyen.tag18} ? 'https://i.pinimg.com/1200x/69/05/e3/6905e37f8ca8a420fd303393921ecec0.jpg' : (${truyen.anhBia != null && !#strings.isEmpty(truyen.anhBia)} ? ${truyen.anhBia} : @{/images/aria.jpg})"
                     class="card-img-top rounded-top" style="aspect-ratio:9/11; object-fit:cover;">

                <div class="card-body d-flex flex-column">
                    <h6 class="card-title fw-bold text-truncate" th:text="${truyen.tenTruyen}" th:title="${truyen.tenTruyen}"></h6>

                    <div th:if="${chuongMoi != null}" class="mb-2 text-truncate" style="font-size: 0.85rem;">
                        <span class="badge bg-danger me-1">New!</span>
                        <a th:href="@{/DustNovel/chuong/{id}(id=${chuongMoi.id})}" class="text-decoration-none text-primary fw-bold"
                           th:text="'Chương ' + ${chuongMoi.soChuong} + ': ' + ${chuongMoi.tieuDe}" th:title="'Chương ' + ${chuongMoi.soChuong} + ': ' + ${chuongMoi.tieuDe}"></a>
                    </div>
                    <div th:unless="${chuongMoi != null}" class="mb-2 text-muted" style="font-size: 0.85rem;"><i>Chưa có chương</i></div>

                    <small class="text-muted mb-2" th:text="'Tác giả: ' + ${truyen.tenTacGia}"></small>
                    
                    <div class="mb-2 d-flex flex-wrap gap-1">
                        <a th:each="tl : ${truyen.theLoais}" th:href="@{/DustNovel/the-loai/{id}(id=${tl.id})}" th:text="${tl.tenTheLoai}" class="badge bg-secondary text-decoration-none"></a>
                    </div>
                    
                    <small class="text-danger mb-2 fw-bold" th:if="${truyen.tag18}">🔞 Nội dung 18+</small>
                    <a th:href="@{/DustNovel/truyen/{id}(id=${truyen.id})}" class="btn btn-sm btn-outline-primary mt-auto fw-bold">Xem truyện</a>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-4" th:if="${#lists.size(truyenDich) > 7}">
          <a th:href="@{/DustNovel/truyen/dich}" class="text-decoration-none">
                <div class="card h-100 shadow-sm border-primary bg-light" style="transition: transform 0.2s; min-height: 380px;">
                    <div class="card-body d-flex flex-column align-items-center justify-content-center text-center">
                        <i class="bi bi-arrow-right-circle text-primary" style="font-size: 4rem;"></i>
                        <h5 class="fw-bold mt-3 text-primary">Xem tất cả</h5>
                        <span class="text-muted small fw-bold" th:text="'Khám phá ' + (${#lists.size(truyenDich)} - 7) + ' truyện khác...'"></span>
                    </div>
                </div>
            </a>
        </div>
    </div>
    
    <style>
        .card:hover { transform: translateY(-5px); }
    </style>
</div>
