<div th:fragment="content">

	<h4 class="mb-3">🔥 Truyện sáng tác</h4>

	<div class="row">
	    <div class="col-md-3 mb-4" th:each="truyen : ${truyenSangTac}">
	        <div class="card h-100 shadow-sm">

	            <!-- Ảnh bìa -->
	            <img th:src="${truyen.tag18}
	                          ? 'https://i.pinimg.com/1200x/69/05/e3/6905e37f8ca8a420fd303393921ecec0.jpg'
	                          : (${truyen.anhBia != null && !#strings.isEmpty(truyen.anhBia)}
	                             ? ${truyen.anhBia}
	                             : @{/images/aria.jpg})"
	                 class="card-img-top"
	                 style="aspect-ratio:9/11; object-fit:cover;">

	            <div class="card-body d-flex flex-column">

	                <h6 class="card-title"
	                    th:text="${truyen.tenTruyen}">
	                </h6>

	                <small class="text-muted mb-1"
	                       th:text="'Tác giả: ' + ${truyen.tenTacGia}">
	                </small>
					<div class="mb-2 d-flex flex-wrap gap-1">
					    <a th:each="tl : ${truyen.theLoais}"
					       th:href="@{/DustNovel/the-loai/{id}(id=${tl.id})}"
					       th:text="${tl.tenTheLoai}"
					       class="badge bg-secondary text-decoration-none">
					    </a>
					</div>
	                <small class="text-danger mb-2"
	                       th:if="${truyen.tag18}">
	                    🔞 Nội dung 18+
	                </small>

	                <a th:href="@{/DustNovel/truyen/{id}(id=${truyen.id})}"
	                   class="btn btn-sm btn-outline-primary mt-auto">
	                    Xem truyện
	                </a>

	            </div>
	        </div>
	    </div>
	</div>
</div>
